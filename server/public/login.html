<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Connexion — Jarvis OS</title><style>:root{font-family:Inter,Segoe UI,system-ui,sans-serif;color:#eef5f7;background:#071017}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 50% 0,#17354a,#071017 45%,#050b10)}.box{width:min(430px,100%);background:linear-gradient(150deg,#0d1c27,#09141d);border:1px solid #203341;border-radius:18px;padding:26px;box-shadow:0 25px 70px #0008}.brand{text-align:center;margin-bottom:24px}.mark{width:65px;height:82px;margin:auto;clip-path:polygon(50% 0,88% 54%,78% 82%,50% 100%,22% 82%,12% 54%);background:linear-gradient(135deg,#173f5f 0 48%,#69bd4d 52% 100%);display:grid;place-items:center}.mark:after{content:'G';font-size:38px;font-weight:900}.brand h1{margin:11px 0 2px}.muted{color:#8ea2af;font-size:13px}label{display:block;font-size:12px;font-weight:700;margin:12px 0 5px}input,button{width:100%;font:inherit;border-radius:9px;padding:12px}input{color:white;background:#071119;border:1px solid #29404f}button{margin-top:17px;border:1px solid #368bc6;background:linear-gradient(180deg,#1988d4,#1165a5);color:white;font-weight:800;cursor:pointer}.secondary{background:transparent;border-color:#29404f;color:#b9c8d1;margin-top:10px}.link{border:0;background:none;color:#63b8ef;padding:10px 0;margin:7px 0 0;text-decoration:underline}.error{color:#ff766f;margin-top:12px;font-size:13px}.success{color:#72d68b;margin-top:12px;font-size:13px}.setup,.recovery{display:none}.hint{font-size:12px;color:#8ea2af;margin-top:6px}</style></head><body><main class="box"><div class="brand"><div class="mark"></div><h1>Jarvis OS</h1><div class="muted">GentleCarE — accès sécurisé</div></div><form id="login"><div id="nameWrap" class="setup"><label>Votre nom</label><input id="name" value="David"><label>Votre e-mail personnel</label><input id="email" type="email" autocomplete="email" placeholder="vous@exemple.fr"></div><label>Identifiant</label><input id="username" autocomplete="username" value="david" required><label>Code personnel à 4 chiffres</label><input id="password" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" autocomplete="current-password" required><div class="hint">Quatre chiffres uniquement.</div><button id="submit">Se connecter</button><button id="forgot" type="button" class="link">Code oublié ?</button><div id="error" class="error"></div></form><form id="recovery" class="recovery"><h2>Créer un nouveau code</h2><div class="muted">Indiquez votre e-mail et choisissez un nouveau code à 4 chiffres.</div><label>Votre e-mail personnel</label><input id="recoveryEmail" type="email" autocomplete="email" required><label>Identifiant</label><input id="recoveryUsername" autocomplete="username" value="david" required><label>Nouveau code à 4 chiffres</label><input id="recoveryPin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required><label>Confirmer le nouveau code</label><input id="recoveryPinConfirm" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required><button type="submit">Enregistrer et ouvrir Jarvis OS</button><button id="cancelRecovery" type="button" class="secondary">Retour à la connexion</button><div id="recoveryMessage"></div></form></main><script>let setup=false;const loginForm=document.querySelector('#login');const recoveryForm=document.querySelector('#recovery');const error=document.querySelector('#error');const recoveryMessage=document.querySelector('#recoveryMessage');function messageFor(code){return({PIN_MUST_BE_4_DIGITS:'Le code doit contenir exactement 4 chiffres.',INVALID_EMAIL:'Adresse e-mail invalide.',INVALID_CREDENTIALS:'Identifiant ou code incorrect.',RECOVERY_IDENTITY_MISMATCH:'L’e-mail ou l’identifiant ne correspondent pas.',RECOVERY_RATE_LIMITED:'Trop de tentatives. Réessayez dans 15 minutes.',EMAIL_ALREADY_EXISTS:'Cette adresse e-mail est déjà utilisée.',USERNAME_REQUIRED:'L’identifiant est obligatoire.',USER_NAME_REQUIRED:'Le nom et l’identifiant sont obligatoires.'})[code]||code||'Opération impossible.'}function enterApp(token){localStorage.setItem('gcos_session',token);location.replace('/?session='+encodeURIComponent(token))}async function status(){try{const r=await fetch('/api/auth/status');const d=await r.json();setup=d.setupRequired;document.querySelector('#nameWrap').style.display=setup?'block':'none';document.querySelector('#forgot').style.display=setup?'none':'block';document.querySelector('#submit').textContent=setup?'Créer le compte administrateur':'Se connecter'}catch(e){error.textContent='Serveur indisponible.'}}loginForm.onsubmit=async e=>{e.preventDefault();error.textContent='';const payload={name:document.querySelector('#name').value,email:document.querySelector('#email').value,username:document.querySelector('#username').value,password:document.querySelector('#password').value};try{let r=await fetch(setup?'/api/auth/setup':'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let d=await r.json();if(!r.ok)throw new Error(d.error||'Connexion impossible');if(setup){r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});d=await r.json();if(!r.ok)throw new Error(d.error||'Connexion impossible')}enterApp(d.token)}catch(e){error.textContent=messageFor(e.message)}};document.querySelector('#forgot').onclick=()=>{loginForm.style.display='none';recoveryForm.style.display='block';document.querySelector('#recoveryEmail').focus()};document.querySelector('#cancelRecovery').onclick=()=>{recoveryForm.style.display='none';loginForm.style.display='block';recoveryMessage.textContent=''};recoveryForm.onsubmit=async e=>{e.preventDefault();recoveryMessage.className='';recoveryMessage.textContent='';const pin=document.querySelector('#recoveryPin').value;const confirm=document.querySelector('#recoveryPinConfirm').value;if(pin!==confirm){recoveryMessage.className='error';recoveryMessage.textContent='Les deux codes ne sont pas identiques.';return}const recovery={email:document.querySelector('#recoveryEmail').value,username:document.querySelector('#recoveryUsername').value,password:pin};try{const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'__recover__',password:JSON.stringify(recovery)})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Réinitialisation impossible');recoveryMessage.className='success';recoveryMessage.textContent='Nouveau code enregistré. Ouverture en cours…';setTimeout(()=>enterApp(d.token),250)}catch(e){recoveryMessage.className='error';recoveryMessage.textContent=messageFor(e.message)}};status();</script></body></html>
