<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Connexion — Jarvis OS</title><style>:root{font-family:Inter,Segoe UI,system-ui,sans-serif;color:#eef5f7;background:#071017}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 50% 0,#17354a,#071017 45%,#050b10)}.box{width:min(430px,100%);background:linear-gradient(150deg,#0d1c27,#09141d);border:1px solid #203341;border-radius:18px;padding:26px;box-shadow:0 25px 70px #0008}.brand{text-align:center;margin-bottom:24px}.mark{width:65px;height:82px;margin:auto;clip-path:polygon(50% 0,88% 54%,78% 82%,50% 100%,22% 82%,12% 54%);background:linear-gradient(135deg,#173f5f 0 48%,#69bd4d 52% 100%);display:grid;place-items:center}.mark:after{content:'G';font-size:38px;font-weight:900}.brand h1{margin:11px 0 2px}.muted{color:#8ea2af;font-size:13px}label{display:block;font-size:12px;font-weight:700;margin:12px 0 5px}input,button{width:100%;font:inherit;border-radius:9px;padding:12px}input{color:white;background:#071119;border:1px solid #29404f}button{margin-top:17px;border:1px solid #368bc6;background:linear-gradient(180deg,#1988d4,#1165a5);color:white;font-weight:800;cursor:pointer}.error{color:#ff766f;margin-top:12px;font-size:13px}.setup{display:none}</style></head><body><main class="box"><div class="brand"><div class="mark"></div><h1>Jarvis OS</h1><div class="muted">GentleCarE — accès sécurisé</div></div><form id="login"><div id="nameWrap" class="setup"><label>Votre nom</label><input id="name" value="David"></div><label>Identifiant</label><input id="username" autocomplete="username" value="david" required><label>Mot de passe</label><input id="password" type="password" autocomplete="current-password" minlength="10" required><button id="submit">Se connecter</button><div id="error" class="error"></div></form></main><script>let setup=false;const error=document.querySelector('#error');async function status(){try{const r=await fetch('/api/auth/status');const d=await r.json();setup=d.setupRequired;document.querySelector('#nameWrap').style.display=setup?'block':'none';document.querySelector('#submit').textContent=setup?'Créer le compte administrateur':'Se connecter'}catch(e){error.textContent='Serveur indisponible.'}}document.querySelector('#login').onsubmit=async e=>{e.preventDefault();error.textContent='';const payload={name:document.querySelector('#name').value,username:document.querySelector('#username').value,password:document.querySelector('#password').value};try{let r=await fetch(setup?'/api/auth/setup':'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let d=await r.json();if(!r.ok)throw new Error(d.error||'Connexion impossible');if(setup){r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});d=await r.json();if(!r.ok)throw new Error(d.error||'Connexion impossible')}localStorage.setItem('gcos_session',d.token);location.href='/'}catch(e){error.textContent=e.message==='PASSWORD_TOO_SHORT'?'Le mot de passe doit contenir au moins 10 caractères.':e.message==='INVALID_CREDENTIALS'?'Identifiant ou mot de passe incorrect.':e.message}};status();</script></body></html>
