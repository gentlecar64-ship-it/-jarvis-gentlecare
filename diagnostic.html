<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#031019"><title>MAVIK — Diagnostic 0.43.0</title><style>:root{--bg:#031019;--line:#20536a;--text:#f4fbff;--muted:#8faaba;--green:#46e36d;--amber:#ffb000;--red:#ff5d68}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 70% 0,#0b3345,#031019 52%);color:var(--text);font-family:Inter,system-ui,sans-serif;padding:18px}.wrap{max-width:1000px;margin:auto}.top,.card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#0a2030,#06151f);box-shadow:0 18px 50px #0005}.top{padding:18px;display:flex;gap:16px;align-items:center}.top img{width:120px;background:white;border-radius:12px;padding:4px}.top h1{margin:0}.muted{color:var(--muted)}.card{padding:16px;margin-top:14px}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid #183d50}.row:first-child{border-top:0}.status{font-weight:900}.ok{color:var(--green)}.warn{color:var(--amber)}.bad{color:var(--red)}button,a{border:1px solid #2b6077;background:#0b2a3b;color:white;border-radius:11px;padding:11px 14px;text-decoration:none;cursor:pointer;font:inherit}.primary{background:#275f3d;border-color:#438d60;font-weight:900}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.log{white-space:pre-wrap;background:#020b11;border:1px solid #163847;border-radius:12px;padding:12px;max-height:350px;overflow:auto;color:#b9d5df;font-family:ui-monospace,monospace;font-size:.75rem}iframe{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}@media(max-width:620px){.top{display:grid;text-align:center}.top img{margin:auto}.row{grid-template-columns:1fr}.actions{display:grid}}</style></head><body><main class="wrap"><section class="top"><img src="assets/brand/gentlecare-logo.png" alt="GentleCarE"><div><h1>Diagnostic MAVIK 0.43.0</h1><p class="muted">Contrôle du Poste Atelier, de la caméra, du moteur opérateur et des pages autonomes.</p></div></section><section class="card"><div id="checks"></div><div class="actions"><button class="primary" id="repairButton">Réparer et installer 0.43.0</button><button id="runButton">Relancer les tests</button><a href="fix-0430.html">Installation Atelier</a><a href="alpha/workshop/index.html?station=atelier">Poste Atelier</a><a href="modules.html">Modules</a></div></section><section class="card"><h2>État de la session locale</h2><div class="log" id="sessionLog"></div></section><section class="card"><h2>Journal technique</h2><div class="log" id="log">Initialisation…</div></section></main><div id="frames"></div><script>const targets=[['Poste Atelier kiosque','alpha/workshop/index.html?station=atelier',true],['Moteur Poste Atelier','alpha/workshop/station.js?v=4300'],['Style Poste Atelier','alpha/workshop/station.css?v=4300'],['Configuration client','client.config.json'],['Verrou MAVIK Core','mavik.instance.lock.json'],['Planning','planning.html',true],['Gestion','gestion.html',true],['Réglages','profil.html',true],['Devis','devis.html',true],['Moteur autonome','mavik-autonomous.js?v=4200'],['Jarvis vocal global','jarvis-voice.js?v=4200'],['Service worker','service-worker.js?v=4300'],['Version','version.json'],['État public','health.json']];const checks=document.getElementById('checks'),log=document.getElementById('log'),sessionLog=document.getElementById('sessionLog'),frames=document.getElementById('frames'),runButton=document.getElementById('runButton'),repairButton=document.getElementById('repairButton'),write=text=>{log.textContent+='\n'+text;log.scrollTop=log.scrollHeight};function sessionState(){let session=null,outbox=[];try{session=JSON.parse(sessionStorage.getItem('jarvis-session')||'null')}catch{}try{outbox=JSON.parse(localStorage.getItem('mavik-workshop-sync-outbox')||'[]')}catch{}sessionLog.textContent='Session : '+(session?JSON.stringify({id:session.id,role:session.role,station:session.station||session.workstation||null},null,2):'aucune')+'\nÉléments Atelier à synchroniser : '+outbox.filter(item=>item.status==='pending').length}function visual(path){return new Promise(resolve=>{const frame=document.createElement('iframe'),timer=setTimeout(()=>{frame.remove();resolve({ok:false,detail:'délai dépassé'})},4500);frame.onload=()=>setTimeout(()=>{try{const text=(frame.contentDocument?.body?.innerText||'').replace(/\s+/g,' ').trim(),ok=text.length>60;clearTimeout(timer);frame.remove();resolve({ok,detail:ok?text.slice(0,90):'contenu vide ou masqué'})}catch(error){clearTimeout(timer);frame.remove();resolve({ok:false,detail:error.message})}},900);frame.src=path+(path.includes('?')?'&':'?')+'visual='+Date.now();frames.appendChild(frame)})}async function test(){log.textContent='Début du diagnostic '+new Date().toLocaleString('fr-FR');checks.innerHTML='';frames.innerHTML='';sessionState();for(const [name,path,view] of targets){const row=document.createElement('div');row.className='row';row.innerHTML='<div><strong>'+name+'</strong><div class="muted">'+path+'</div></div><span class="status warn">Test…</span>';checks.appendChild(row);try{const separator=path.includes('?')?'&':'?';const response=await fetch(path+separator+'diagnostic='+Date.now(),{cache:'no-store'});let ok=response.ok,detail='HTTP '+response.status;if(ok&&view){const result=await visual(path);ok=result.ok;detail+=' · '+result.detail}row.querySelector('.status').textContent=ok?'OK':'Erreur';row.querySelector('.status').className='status '+(ok?'ok':'bad');write(name+' : '+detail)}catch(error){row.querySelector('.status').textContent='Inaccessible';row.querySelector('.status').className='status bad';write(name+' : '+error.message)}}if('serviceWorker'in navigator){const registrations=await navigator.serviceWorker.getRegistrations();write('Service workers : '+registrations.length)}const names='caches'in window?await caches.keys():[];write('Caches : '+names.join(', '))}repairButton.onclick=()=>{repairButton.disabled=true;repairButton.textContent='Réparation en cours…';location.href='fix-0430.html?from=diagnostic-'+Date.now()};runButton.onclick=test;test();</script></body></html>
