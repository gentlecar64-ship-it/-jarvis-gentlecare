<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#031019"><title>MAVIK — Diagnostic 0.41.0</title><style>:root{--bg:#031019;--line:#20536a;--text:#f4fbff;--muted:#8faaba;--green:#46e36d;--amber:#ffb000;--red:#ff5d68}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 70% 0,#0b3345,#031019 52%);color:var(--text);font-family:Inter,system-ui,sans-serif;padding:18px}.wrap{max-width:980px;margin:auto}.top,.card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#0a2030,#06151f);box-shadow:0 18px 50px #0005}.top{padding:18px;display:flex;gap:16px;align-items:center}.top img{width:120px;background:white;border-radius:12px;padding:4px}.top h1{margin:0}.muted{color:var(--muted)}.card{padding:16px;margin-top:14px}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid #183d50}.row:first-child{border-top:0}.status{font-weight:900}.ok{color:var(--green)}.warn{color:var(--amber)}.bad{color:var(--red)}button,a{border:1px solid #2b6077;background:#0b2a3b;color:white;border-radius:11px;padding:11px 14px;text-decoration:none;cursor:pointer;font:inherit}.primary{background:#275f3d;border-color:#438d60;font-weight:900}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.log{white-space:pre-wrap;background:#020b11;border:1px solid #163847;border-radius:12px;padding:12px;max-height:330px;overflow:auto;color:#b9d5df;font-family:ui-monospace,monospace;font-size:.75rem}@media(max-width:620px){.top{display:grid;text-align:center}.top img{margin:auto}.row{grid-template-columns:1fr}.actions{display:grid}}</style></head><body><main class="wrap"><section class="top"><img src="assets/brand/gentlecare-logo.png" alt="GentleCarE"><div><h1>Diagnostic MAVIK 0.41.0</h1><p class="muted">Contrôle de la connexion, du code oublié, des sessions temporaires, des modules et du cache public.</p></div></section><section class="card"><div id="checks"></div><div class="actions"><button class="primary" id="repair">Réparer et installer 0.41.0</button><button id="run">Relancer les tests</button><a href="index.html?fresh=4100">Connexion</a><a href="modules.html">Modules</a><a href="update.html">Mise à jour</a></div></section><section class="card"><h2>État de la session locale</h2><div class="log" id="sessionLog"></div></section><section class="card"><h2>Journal technique</h2><div class="log" id="log">Initialisation…</div></section></main><script>const targets=[['Nouvel écran de connexion','index.html'],['Centre des modules','modules.html'],['Chargeur d’habilitations','module-loader.js?v=4100'],['Garde-fou et expiration','mavik-stability.js?v=4100'],['Service worker','service-worker.js?v=4100'],['Installateur','install.js?v=4100'],['Planning','planning.html'],['Poste atelier','alpha/workshop/index.html'],['Gestion','gestion.html'],['Améliorations','ameliorations.html'],['Sécurité et accès','securite.html'],['Factures protégées','factures.html'],['Stock équipe','stock.html'],['Version','version.json'],['État public','health.json']];const checks=document.getElementById('checks'),log=document.getElementById('log'),sessionLog=document.getElementById('sessionLog');const write=t=>{log.textContent+='\n'+t;log.scrollTop=log.scrollHeight};function sessionState(){let s=null,r=[],n=[];try{s=JSON.parse(sessionStorage.getItem('jarvis-session')||'null')}catch{}try{r=JSON.parse(localStorage.getItem('mavik-code-reset-requests')||'[]')}catch{}try{n=JSON.parse(localStorage.getItem('mavik-direction-notifications')||'[]')}catch{}sessionLog.textContent='Session : '+(s?JSON.stringify({id:s.id,temporary:!!s.temporary,temporaryUntil:s.temporaryUntil||null},null,2):'aucune')+'\nDemandes code en attente : '+r.filter(x=>x.status==='En attente').length+'\nNotifications Direction : '+n.filter(x=>x.status==='Non lue').length}async function test(){log.textContent='Début du diagnostic '+new Date().toLocaleString('fr-FR');checks.innerHTML='';sessionState();for(const [name,path] of targets){const row=document.createElement('div');row.className='row';row.innerHTML='<div><strong>'+name+'</strong><div class="muted">'+path+'</div></div><span class="status warn">Test…</span>';checks.appendChild(row);try{const sep=path.includes('?')?'&':'?';const response=await fetch(path+sep+'diagnostic='+Date.now(),{cache:'no-store'});const ok=response.ok;row.querySelector('.status').textContent=ok?'Disponible ('+response.status+')':'Erreur '+response.status;row.querySelector('.status').className='status '+(ok?'ok':'bad');write(name+' : HTTP '+response.status)}catch(error){row.querySelector('.status').textContent='Inaccessible';row.querySelector('.status').className='status bad';write(name+' : '+error.message)}}if('serviceWorker'in navigator){const registrations=await navigator.serviceWorker.getRegistrations();write('Service workers : '+registrations.length)}const names='caches'in window?await caches.keys():[];write('Caches : '+names.join(', '))}async function repair(){const b=document.getElementById('repair');b.disabled=true;b.textContent='Réparation en cours…';try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));write('Anciens services workers supprimés.')}if('caches'in window){const names=await caches.keys();await Promise.all(names.map(n=>caches.delete(n)));write('Anciens caches supprimés.')}sessionStorage.removeItem('jarvis-booted');const reg=await navigator.serviceWorker.register('./service-worker.js?v=4100&fresh='+Date.now(),{updateViaCache:'none'});await reg.update();if(reg.waiting)reg.waiting.postMessage({type:'SKIP_WAITING'});write('Service worker 0.41.0 installé.');location.replace('index.html?repaired=4100-'+Date.now())}catch(error){write('Échec : '+error.message);b.disabled=false;b.textContent='Réparer et installer 0.41.0'}}document.getElementById('run').onclick=test;document.getElementById('repair').onclick=repair;test();</script><script src="mavik-stability.js?v=4100"></script></body></html>
