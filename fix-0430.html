<!doctype html>
<html lang="fr">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#031019"><title>MAVIK — Installation Poste Atelier 0.43.0</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;background:radial-gradient(circle at 50% 0,#0b4051,#031019 58%);color:#f5fbff;font-family:Inter,system-ui,sans-serif}.box{width:min(760px,100%);border:1px solid #286079;border-radius:22px;background:#071a27;padding:22px;box-shadow:0 25px 80px #0009}.logo{display:block;width:190px;max-width:70%;margin:auto;background:white;border-radius:14px;padding:4px}h1{text-align:center}.lead{text-align:center;color:#a9c2cd}.state{margin-top:16px;border:1px solid #24566b;border-radius:12px;background:#020b11;padding:13px;white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:.78rem;min-height:210px}.progress{height:12px;border-radius:999px;background:#102f3e;overflow:hidden;margin-top:14px}.progress span{display:block;width:5%;height:100%;background:linear-gradient(90deg,#19d8ef,#46e36d);transition:width .25s}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}button,a{border:1px solid #2c6177;border-radius:11px;background:#0b2a3b;color:white;padding:12px;text-align:center;text-decoration:none;cursor:pointer;font:inherit}.primary{background:#28603d;border-color:#4e9965;font-weight:900}@media(max-width:600px){.actions{grid-template-columns:1fr}}</style></head>
<body><main class="box"><img class="logo" src="assets/brand/gentlecare-logo.png" alt="GentleCarE"><h1>Installation MAVIK 0.43.0</h1><p class="lead">Poste Atelier, caméra Logitech, planning temps réel et assistance vocale.</p><div class="progress"><span id="bar"></span></div><div class="state" id="log">Initialisation…</div><div class="actions"><button class="primary" id="retry">Relancer l’installation</button><a href="alpha/workshop/index.html?station=atelier&manual=4300">Ouvrir le Poste Atelier</a></div></main><script>
const log=document.getElementById('log'),bar=document.getElementById('bar'),retry=document.getElementById('retry'),write=text=>{log.textContent+='\n'+text;log.scrollTop=log.scrollHeight};let running=false;
async function install(){if(running)return;running=true;retry.disabled=true;log.textContent='Installation MAVIK 0.43.0';try{bar.style.width='15%';if('serviceWorker'in navigator){const registrations=await navigator.serviceWorker.getRegistrations();await Promise.all(registrations.map(registration=>registration.unregister()));write('✓ Anciens services workers supprimés')}bar.style.width='30%';if('caches'in window){const names=await caches.keys();await Promise.all(names.map(name=>caches.delete(name)));write('✓ Anciens caches supprimés : '+(names.join(', ')||'aucun'))}bar.style.width='50%';const files=['alpha/workshop/index.html','alpha/workshop/station.js?v=4300','alpha/workshop/station.css?v=4300','client.config.json','mavik.instance.lock.json','version.json','health.json'];for(const file of files){const separator=file.includes('?')?'&':'?';const response=await fetch(file+separator+'fresh='+Date.now(),{cache:'no-store'});if(!response.ok)throw new Error(file+' : HTTP '+response.status);write('✓ '+file+' : HTTP '+response.status)}bar.style.width='82%';if('serviceWorker'in navigator){const registration=await navigator.serviceWorker.register('./service-worker.js?v=4300&fresh='+Date.now(),{updateViaCache:'none'});await registration.update();if(registration.waiting)registration.waiting.postMessage({type:'SKIP_WAITING'});write('✓ Service worker v4300 installé')}bar.style.width='100%';write('✓ Installation terminée. Ouverture du Poste Atelier…');setTimeout(()=>location.replace('alpha/workshop/index.html?station=atelier&installed=4300-'+Date.now()),800)}catch(error){write('✗ '+error.message);bar.style.width='10%';running=false;retry.disabled=false}}
retry.onclick=install;setTimeout(install,250);
</script></body></html>
