<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#111318">
<link rel="manifest" href="manifest.webmanifest"><title>Jarvis GentleCarE</title>
<style>
:root{--panel:#171a21;--panel2:#20242d;--text:#f7f7f8;--muted:#a9afbd;--yellow:#ffd400;--green:#22c55e;--red:#ef4444;--border:#303641}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,#0b0d11,#12151b);color:var(--text);min-height:100vh}button,input,select,textarea{font:inherit}.app{max-width:1280px;margin:auto;padding:18px}.topbar,.section-title,.actions,.item{display:flex;gap:12px;align-items:center}.topbar,.section-title,.item{justify-content:space-between}.brand{display:flex;gap:12px;align-items:center}.brand-logo{width:58px;height:58px;border-radius:14px;background:#fff;padding:5px;object-fit:contain}.brand h1{margin:0;font-size:1.35rem}.muted{color:var(--muted)}.nav{display:flex;gap:8px;overflow:auto;margin:18px 0}.nav button,.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:12px;padding:10px 14px;cursor:pointer}.nav button.active,.btn.primary{background:var(--yellow);color:#111;border-color:var(--yellow);font-weight:900}.btn.danger{background:#5f1d1d}.btn.small{padding:7px 10px;font-size:.85rem}.jarvis{background:linear-gradient(135deg,#6d28d9,#9f67ff);border:0;font-weight:800}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:rgba(23,26,33,.96);border:1px solid var(--border);border-radius:18px;padding:16px}.span-12{grid-column:span 12}.span-6{grid-column:span 6}.hero{display:flex;justify-content:space-between;gap:16px;align-items:center}.hero h2{font-size:clamp(1.7rem,4vw,3rem);margin:0 0 8px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:var(--panel2);padding:14px;border-radius:14px;cursor:pointer}.stat strong{display:block;font-size:1.55rem}.list{display:flex;flex-direction:column;gap:10px}.item{background:var(--panel2);border-radius:14px;padding:13px}.item-title{font-weight:800}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:.78rem;font-weight:800;background:#343945}.green{background:#123e23;color:#76ef9d}.red{background:#4b1717;color:#ff9393}.yellow{background:#5b4d00;color:#ffe45c}.purple{background:#34205a;color:#cdb2ff}.search,textarea,select{width:100%;border:1px solid var(--border);background:#101319;color:var(--text);border-radius:12px;padding:12px}.quote-controls{display:grid;grid-template-columns:180px 170px auto;gap:8px;align-items:center}.footer{padding:28px 0;color:var(--muted);text-align:center}.modal,.login{position:fixed;inset:0;background:rgba(8,9,12,.96);display:grid;place-items:center;padding:18px;z-index:50}.modal-card,.login-card{width:min(680px,100%);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:22px}.profiles{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px}.profile{padding:20px 12px;border:1px solid var(--border);background:var(--panel2);border-radius:16px;color:var(--text);font-weight:800}.pin{font-size:1.5rem;letter-spacing:.5rem;text-align:center}.rights{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.right{background:var(--panel2);padding:10px;border-radius:10px}.dot{width:10px;height:10px;border-radius:50%;background:var(--green)}@media(max-width:900px){.span-6{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}.hero,.topbar{align-items:flex-start;flex-direction:column}.quote-controls{grid-template-columns:1fr}.nav{width:100%}}@media(max-width:560px){.app{padding:12px}.item{align-items:flex-start;flex-direction:column}.actions{width:100%;flex-wrap:wrap}.actions .btn{flex:1}.profiles,.rights{grid-template-columns:1fr}}
</style></head>
<body><div id="loginRoot"></div><div class="app" id="app" hidden><header class="topbar"><div class="brand"><img class="brand-logo" src="icon.svg" alt="Logo GentleCarE"><div><h1>Jarvis GentleCarE</h1><div class="muted" id="today"></div></div></div><div class="actions"><span class="dot"></span><strong id="currentUser"></strong><button class="btn small" onclick="logout()">Déconnexion</button><button class="btn jarvis" id="jarvisBtn">🎤 Parler à Jarvis</button></div></header><nav class="nav" id="nav"></nav><main id="content"></main><div class="footer">Jarvis GentleCarE • accès protégé par code personnel</div></div><div id="modalRoot"></div>
<script>
const defaultAccounts=[{id:'david',name:'David',role:'direction',pin:null,rights:{tasks:true,quotes:true,orders:true,workshop:true,direction:true,users:true}},{id:'bene',name:'Bénédicte',role:'direction',pin:null,rights:{tasks:true,quotes:true,orders:true,workshop:true,direction:true,users:true}}];
const seed={tasks:[{id:'t1',title:'Vérifier activation du compte LDLC Pro',domain:'Commercial',priority:'Haute',done:false}],quotes:[{id:'q1',client:'Client Club Mustang',vehicle:'Audi S5 V8',amount:1050,status:'À valider',offer:'Pass Fondateur –30 %',sentAt:null,expiresAt:null}],orders:[{id:'o1',supplier:'Intelblast',label:'Machine cryogénique',amount:9900,status:'À confirmer',detail:'Livraison fin août/début septembre'}],interventions:[{id:'i1',client:'Béné',vehicle:'Mini blanche 2005',status:'Préparation',date:new Date().toISOString()}],journal:[]};
let accounts=JSON.parse(localStorage.getItem('jarvis-accounts')||'null')||structuredClone(defaultAccounts),state=JSON.parse(localStorage.getItem('gcos-state')||'null')||structuredClone(seed),session=JSON.parse(sessionStorage.getItem('jarvis-session')||'null'),user=null,page='Accueil';
function saveAccounts(){localStorage.setItem('jarvis-accounts',JSON.stringify(accounts))}function save(){localStorage.setItem('gcos-state',JSON.stringify(state))}function log(text){state.journal.unshift({id:crypto.randomUUID(),at:new Date().toISOString(),text:`${user?.name||'Utilisateur'} — ${text}`});save()}
function migrateQuotes(){state.quotes=(state.quotes||[]).map(q=>({...q,status:q.status||'À valider',sentAt:q.sentAt||null,expiresAt:q.expiresAt||null}));purgeExpiredQuotes();save()}
function purgeExpiredQuotes(){let now=new Date();now.setHours(0,0,0,0);let removed=[];state.quotes=state.quotes.filter(q=>{if(!q.expiresAt)return true;let d=new Date(q.expiresAt+'T00:00:00');if(d<=now){removed.push(q);return false}return true});removed.forEach(q=>state.journal.unshift({id:crypto.randomUUID(),at:new Date().toISOString(),text:`Jarvis — Devis supprimé à échéance : ${q.vehicle} / ${q.client}`}));if(removed.length)save()}
function startLogin(){document.getElementById('app').hidden=true;document.getElementById('loginRoot').innerHTML=`<div class="login"><div class="login-card"><img class="brand-logo" src="icon.svg" style="margin:auto"><h2>Jarvis GentleCarE</h2><p class="muted">Choisissez votre profil.</p><div class="profiles">${accounts.map(a=>`<button class="profile" onclick="selectAccount('${a.id}')">👤 ${a.name}<br><span class="muted">${a.role==='direction'?'Direction':'Employé'}</span></button>`).join('')}</div></div></div>`}
function selectAccount(id){let a=accounts.find(x=>x.id===id);if(!a)return;if(!a.pin)return setupPin(a);askPin(a)}
function setupPin(a){document.getElementById('loginRoot').innerHTML=`<div class="login"><div class="login-card"><h2>Créer le code de ${a.name}</h2><input id="pin1" class="search pin" inputmode="numeric" maxlength="4"><input id="pin2" class="search pin" inputmode="numeric" maxlength="4" style="margin-top:10px"><button class="btn primary" style="width:100%;margin-top:12px" onclick="confirmPin('${a.id}')">Enregistrer</button></div></div>`}
function confirmPin(id){let p1=pin1.value,p2=pin2.value;if(!/^\d{4}$/.test(p1)||p1!==p2)return alert('Vérifiez les codes.');let a=accounts.find(x=>x.id===id);a.pin=p1;saveAccounts();openSession(a)}
function askPin(a){document.getElementById('loginRoot').innerHTML=`<div class="login"><div class="login-card"><h2>Bonjour ${a.name}</h2><input id="pin" class="search pin" inputmode="numeric" maxlength="4"><button class="btn primary" style="width:100%;margin-top:12px" onclick="verifyPin('${a.id}')">Se connecter</button></div></div>`}
function verifyPin(id){let a=accounts.find(x=>x.id===id);if(pin.value!==a.pin)return alert('Code incorrect.');openSession(a)}function openSession(a){session={id:a.id,at:Date.now()};sessionStorage.setItem('jarvis-session',JSON.stringify(session));user=a;if(a.role==='employee'){location.href='employe.html';return}boot()}function logout(){sessionStorage.removeItem('jarvis-session');location.reload()}function allowed(k){return !!user?.rights?.[k]}
function pages(){let p=['Accueil'];if(allowed('quotes'))p.push('Devis');if(allowed('workshop'))p.push('Atelier');if(allowed('orders'))p.push('Commandes');if(allowed('tasks'))p.push('Tâches');if(allowed('direction'))p.push('Direction');return p}function nav(){navEl=document.getElementById('nav');navEl.innerHTML=pages().map(p=>`<button class="${p===page?'active':''}" onclick="go('${p}')">${p}</button>`).join('')}function go(p){page=p;render()}
function badge(v){let s=(v||'').toLowerCase(),c=s.includes('accept')||s.includes('valid')||s==='terminée'?'green':s.includes('refus')||s.includes('annul')||s.includes('bloqué')?'red':s.includes('attente')||s.includes('envoy')||s.includes('confirmer')?'yellow':'purple';return `<span class="badge ${c}">${v}</span>`}
function quoteItem(q){let expiry=q.expiresAt?new Date(q.expiresAt+'T00:00:00').toLocaleDateString('fr-FR'):'Aucune';return `<div class="item"><div><div class="item-title">${q.vehicle} — ${Number(q.amount||0).toLocaleString('fr-FR')} € TTC</div><div class="muted">${q.client} • ${q.offer||''}</div><div class="muted">Échéance : ${expiry}${q.sentAt?' • Envoyé le '+new Date(q.sentAt).toLocaleDateString('fr-FR'):''}</div></div><div class="quote-controls"><select onchange="updateQuoteStatus('${q.id}',this.value)">${['À valider','Prêt à envoyer','Envoyé','En attente de réponse','Accepté','Refusé','Annulé'].map(s=>`<option ${q.status===s?'selected':''}>${s}</option>`).join('')}</select><input type="date" value="${q.expiresAt||''}" onchange="updateQuoteExpiry('${q.id}',this.value)" title="Date d’échéance"><button class="btn small" onclick="openQuoteModal('${q.id}')">Modifier</button></div></div>`}
function renderAccueil(){return `<div class="grid"><section class="card span-12 hero"><div><h2>Bonjour ${user.name}.</h2><p class="muted">Bienvenue dans Jarvis GentleCarE.</p></div><button class="btn primary" onclick="go('Devis')">Voir les devis</button></section><section class="card span-12"><div class="stats"><div class="stat" onclick="go('Tâches')"><span class="muted">Tâches</span><strong>${state.tasks.filter(t=>!t.done).length}</strong></div><div class="stat" onclick="go('Devis')"><span class="muted">Devis actifs</span><strong>${state.quotes.length}</strong></div><div class="stat" onclick="go('Commandes')"><span class="muted">Commandes</span><strong>${state.orders.length}</strong></div><div class="stat" onclick="go('Atelier')"><span class="muted">Interventions</span><strong>${state.interventions.length}</strong></div></div></section></div>`}
function renderDevis(){purgeExpiredQuotes();let sent=state.quotes.filter(q=>['Envoyé','En attente de réponse'].includes(q.status)),other=state.quotes.filter(q=>!['Envoyé','En attente de réponse'].includes(q.status));return `<div class="grid"><section class="card span-12"><div class="section-title"><div><h3>Devis envoyés / en attente</h3><div class="muted">Ils restent visibles jusqu’à leur date d’échéance.</div></div><button class="btn primary" onclick="openQuoteModal()">Ajouter un devis</button></div><div class="list">${sent.length?sent.map(quoteItem).join(''):'<div class="muted">Aucun devis envoyé ou en attente de réponse.</div>'}</div></section><section class="card span-12"><h3>Autres devis</h3><div class="list" style="margin-top:12px">${other.length?other.map(quoteItem).join(''):'<div class="muted">Aucun autre devis actif.</div>'}</div></section></div>`}
function updateQuoteStatus(id,status){let q=state.quotes.find(x=>x.id===id);if(!q)return;q.status=status;if(status==='Envoyé'&&!q.sentAt)q.sentAt=new Date().toISOString();log(`Statut du devis ${q.vehicle} : ${status}`);render()}function updateQuoteExpiry(id,date){let q=state.quotes.find(x=>x.id===id);if(!q)return;q.expiresAt=date||null;log(`Échéance du devis ${q.vehicle} modifiée`);purgeExpiredQuotes();render()}
function openQuoteModal(id=null){let q=id?state.quotes.find(x=>x.id===id):null;document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><h3>${q?'Modifier':'Ajouter'} un devis</h3><input id="qClient" class="search" placeholder="Client" value="${q?.client||''}"><input id="qVehicle" class="search" style="margin-top:8px" placeholder="Véhicule" value="${q?.vehicle||''}"><input id="qAmount" class="search" style="margin-top:8px" type="number" placeholder="Montant TTC" value="${q?.amount||''}"><input id="qOffer" class="search" style="margin-top:8px" placeholder="Offre / prestation" value="${q?.offer||''}"><input id="qExpiry" class="search" style="margin-top:8px" type="date" value="${q?.expiresAt||''}"><button class="btn primary" style="width:100%;margin-top:12px" onclick="saveQuote('${q?.id||''}')">Enregistrer</button>${q?`<button class="btn danger" style="width:100%;margin-top:8px" onclick="deleteQuote('${q.id}')">Supprimer maintenant</button>`:''}<button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">Annuler</button></div></div>`}
function saveQuote(id){let q=id?state.quotes.find(x=>x.id===id):null,data={client:qClient.value.trim(),vehicle:qVehicle.value.trim(),amount:Number(qAmount.value||0),offer:qOffer.value.trim(),expiresAt:qExpiry.value||null};if(!data.client||!data.vehicle)return alert('Indiquez le client et le véhicule.');if(q)Object.assign(q,data);else state.quotes.unshift({id:crypto.randomUUID(),status:'À valider',sentAt:null,...data});log(`${q?'Devis modifié':'Devis créé'} : ${data.vehicle}`);closeModal();render()}function deleteQuote(id){let q=state.quotes.find(x=>x.id===id);if(!q||!confirm(`Supprimer le devis ${q.vehicle} ?`))return;state.quotes=state.quotes.filter(x=>x.id!==id);log(`Devis supprimé : ${q.vehicle}`);closeModal();render()}
function renderAtelier(){return `<div class="grid"><section class="card span-12"><div class="section-title"><h3>Atelier</h3><div class="actions"><a class="btn primary" href="planning-atelier.html">Planning du jour</a><a class="btn" href="employe.html">Mode employé</a></div></div><div class="list">${state.interventions.map(i=>`<div class="item"><div><strong>${i.vehicle}</strong><div class="muted">${i.client} • ${new Date(i.date).toLocaleDateString('fr-FR')}</div></div>${badge(i.status)}</div>`).join('')}</div></section></div>`}
function renderCommandes(){return `<div class="grid"><section class="card span-12"><h3>Commandes</h3><div class="list">${state.orders.map(o=>`<div class="item"><div><strong>${o.label} — ${o.supplier}</strong><div class="muted">${o.detail}</div></div>${badge(o.status)}</div>`).join('')}</div></section></div>`}function renderTasks(){return `<div class="grid"><section class="card span-12"><h3>Tâches</h3><div class="list">${state.tasks.map(t=>`<div class="item"><div><strong>${t.done?'✓ ':''}${t.title}</strong></div><button class="btn small" onclick="toggleTask('${t.id}')">${t.done?'Rouvrir':'Terminer'}</button></div>`).join('')}</div></section></div>`}function toggleTask(id){let t=state.tasks.find(x=>x.id===id);t.done=!t.done;log(`Tâche ${t.done?'terminée':'rouverte'} : ${t.title}`);render()}
function renderDirection(){return `<div class="grid"><section class="card span-6"><h3>Journal</h3><div class="list">${state.journal.slice(0,20).map(j=>`<div class="item"><div>${j.text}<div class="muted">${new Date(j.at).toLocaleString('fr-FR')}</div></div></div>`).join('')}</div></section><section class="card span-6"><h3>Utilisateurs</h3><div class="list">${accounts.map(a=>`<div class="item"><strong>${a.name}</strong><span class="muted">${a.role}</span></div>`).join('')}</div></section></div>`}
function render(){nav();let map={Accueil:renderAccueil,Devis:renderDevis,Atelier:renderAtelier,Commandes:renderCommandes,Tâches:renderTasks,Direction:renderDirection};document.getElementById('content').innerHTML=(map[page]||renderAccueil)()}function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function jarvis(){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return alert('Reconnaissance vocale indisponible.');let r=new SR();r.lang='fr-FR';r.onresult=e=>{let q=e.results[0][0].transcript.toLowerCase();if(q.includes('devis'))go('Devis');else if(q.includes('atelier'))go('Atelier');else if(q.includes('commande'))go('Commandes');else if(q.includes('tâche'))go('Tâches')};r.start()}function boot(){migrateQuotes();document.getElementById('loginRoot').innerHTML='';document.getElementById('app').hidden=false;document.getElementById('currentUser').textContent=user.name;document.getElementById('today').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});document.getElementById('jarvisBtn').onclick=jarvis;render();setInterval(()=>{purgeExpiredQuotes();if(page==='Devis')render()},60000)}
if(session){user=accounts.find(a=>a.id===session.id);if(user){if(user.role==='employee')location.href='employe.html';else boot()}else startLogin()}else startLogin();
</script></body></html>
