r:1px solid var(--border);font-size:.84rem}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:var(--panel2);padding:14px;border-radius:14px;cursor:pointer}.stat strong{display:block;font-size:1.55rem}.list{display:flex;flex-direction:column;gap:10px}.item{background:var(--panel2);border-radius:14px;padding:13px}.item-title{font-weight:800}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:.78rem;font-weight:800;background:#343945}.green{background:#123e23;color:#76ef9d}.red{background:#4b1717;color:#ff9393}.yellow{background:#5b4d00;color:#ffe45c}.purple{background:#34205a;color:#cdb2ff}.search,textarea,select{width:100%;border:1px solid var(--border);background:#101319;color:var(--text);border-radius:12px;padding:12px}.quote-controls{display:grid;grid-template-columns:180px 170px auto;gap:8px;align-items:center}.footer{padding:28px 0;color:var(--muted);text-align:center}.modal,.login{position:fixed;inset:0;background:rgba(8,9,12,.96);display:grid;place-items:center;padding:18px;z-index:70}.modal-card,.login-card{width:min(680px,100%);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:22px}.profiles{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px}.profile{padding:20px 12px;border:1px solid var(--border);background:var(--panel2);border-radius:16px;color:var(--text);font-weight:800}.pin{font-size:1.5rem;letter-spacing:.5rem;text-align:center}.dot{width:10px;height:10px;border-radius:50%;background:var(--green)}.safetybar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(13,15,19,.98);border-top:1px solid var(--border);padding:10px max(12px,env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));display:flex;gap:10px;justify-content:center}.safetybar .btn{flex:1;max-width:280px}.alert-screen{position:fixed;inset:0;z-index:120;background:#8b1111;color:#fff;display:none;place-items:center;text-align:center;padding:24px}.alert-screen.open{display:grid;animation:pulseBg .8s infinite alternate}.alert-screen h1{font-size:clamp(2rem,8vw,5rem);margin:.2em}.alert-screen p{font-size:1.25rem}@keyframes pulseBg{from{background:#761010}to{background:#d01717}}@media(max-width:900px){.span-8,.span-6,.span-4{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}.hero,.topbar{align-items:flex-start;flex-direction:column}.quote-controls{grid-template-columns:1fr}.nav{width:100%}}@media(max-width:560px){.app{padding:12px 12px 210px}.item{align-items:flex-start;flex-direction:column}.actions{width:100%;flex-wrap:wrap}.actions .btn{flex:1}.profiles{grid-template-columns:1fr}.safetybar{flex-wrap:wrap}.safetybar .btn{min-width:30%}}

<body><div id="loginRoot"></div><div class="app" id="app" hidden><header class="topbar"><div class="brand"><img class="brand-logo" src="icon.svg" alt="Logo GentleCarE"><div><h1>GCOS — Jarvis GentleCarE</h1><div class="muted" id="today"></div></div></div><div class="actions"><span class="dot"></span><strong id="currentUser"></strong><button class="btn small" onclick="endDay()">🌙 Fin de journée</button><button class="btn small" onclick="logout()">Déconnexion</button><button class="btn jarvis" id="jarvisBtn">🎤 Parler à Jarvis</button></div></header><nav class="nav" id="nav"></nav><main id="content"></main><div class="footer">GCOS • système d’exploitation GentleCarE • accès protégé</div></div><div id="modalRoot"></div><div class="safetybar"><button class="btn" onclick="openContact()">💬 Contacter</button><button class="btn" onclick="triggerAssistance()">🟠 Assistance</button><button class="btn danger" onclick="confirmEmergency()">🚨 URGENCE</button></div><div class="alert-screen" id="alertScreen"><div><div style="font-size:5rem">🚨</div><h1>URGENCE GCOS</h1><p id="alertText"></p><div class="actions" style="justify-content:center"><a class="btn primary" href="tel:112">📞 Appeler le 112</a><button class="btn" onclick="ackEmergency()">J’ai pris connaissance</button></div></div></div>
<script>
const defaultAccounts=[{id:'david',name:'David',role:'direction',pin:null,rights:{tasks:true,quotes:true,orders:true,workshop:true,direction:true,users:true}},{id:'bene',name:'Bénédicte',role:'direction',pin:null,rights:{tasks:true,quotes:true,orders:true,workshop:true,direction:true,users:true}},{id:'severine',name:'Séverine',role:'employee',pin:null,rights:{tasks:true,quotes:false,orders:false,workshop:true,direction:false,users:false}},{id:'employee1',name:'Employé 1',role:'employee',pin:null,rights:{tasks:true,quotes:false,orders:false,workshop:true,direction:false,users:false}}];
const seed={tasks:[{id:'t1',title:'Vérifier activation du compte LDLC Pro',domain:'Commercial',priority:'Haute',done:false}],quotes:[{id:'q1',client:'Client Club Mustang',vehicle:'Audi S5 V8',amount:1050,status:'À valider',offer:'Pass Fondateur –30 %',sentAt:null,expiresAt:null}],orders:[{id:'o1',supplier:'Intelblast',label:'Machine cryogénique',amount:9900,status:'À confirmer',detail:'Livraison fin août/début septembre'}],interventions:[{id:'i1',client:'Béné',vehicle:'Mini blanche 2005',status:'Préparation',date:new Date().toISOString()}],journal:[]};
let stored=JSON.parse(localStorage.getItem('jarvis-accounts')||'null')||[];const byId=new Map(stored.map(a=>[a.id,a]));defaultAccounts.forEach(a=>{if(!byId.has(a.id))byId.set(a.id,a)});let accounts=[...byId.values()],state=JSON.parse(localStorage.getItem('gcos-state')||'null')||structuredClone(seed),session=JSON.parse(sessionStorage.getItem('jarvis-session')||'null'),user=null,page='Accueil',alarmTimer=null;saveAccounts();
function saveAccounts(){localStorage.setItem('jarvis-accounts',JSON.stringify(accounts))}function save(){localStorage.setItem('gcos-state',JSON.stringify(state))}function log(text){state.journal.unshift({id:crypto.randomUUID?crypto.randomUUID():Date.now().toString(),at:new Date().toISOString(),text:`${user?.name||'Utilisateur'} — ${text}`});save()}
function chooseVoice(){let v=speechSynthesis.getVoices().filter(x=>x.lang&&x.lang.toLowerCase().startsWith('fr'));return v.find(x=>/thomas|henri|paul|homme|male/i.test(x.name))||v[0]||null}function speak(text){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(text);u.lang='fr-FR';u.rate=.95;let v=chooseVoice();if(v)u.voice=v;speechSynthesis.speak(u)}
function tone(type='ok'){try{let c=new(window.AudioContext||window.webkitAudioContext)(),notes=type==='start'?[440,660,880]:type==='urgent'?[880,660,880]:[660,880];notes.forEach((f,i)=>{let o=c.createOscillator(),g=c.createGain();o.frequency.value=f;g.gain.value=.06;o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.15);o.stop(c.currentTime+i*.15+.12)})}catch(e){}}
function migrateQuotes(){state.quotes=(state.quotes||[]).map(q=>({...q,status:q.status||'À valider',sentAt:q.sentAt||null,expiresAt:q.expiresAt||null}));purgeExpiredQuotes();save()}function purgeExpiredQuotes(){let now=new Date();now.setHours(0,0,0,0);state.quotes=state.quotes.filter(q=>!q.expiresAt||new Date(q.expiresAt+'T00:00:00')>now);save()}
function startLogin(){document.getElementById('app').hidden=true;document.getElementById('loginRoot').innerHTML=`<div class="login"><div class="login-card"><img class="brand-logo" src="icon.svg" style="margin:auto"><h2>Jarvis GentleCarE</h2><p class="muted">Choisissez votre profil.</p><div class="profiles">${accounts.map(a=>`<button class="profile" onclick="selectAccount('${a.id}')">👤 ${a.name}<br><span class="muted">${a.role==='direction'?'Direction':'Employé'}</span></button>`).join('')}</div></div></div>`}
function selectAccount(id){let a=accounts.find(x=>x.id===id);if(!a)return;if(!a.pin)return setupPin(a);askPin(a)}function setupPin(a){document.getElementById('loginRoot').innerHTML=`<div class="login"><div class="login-card"><h2>Créer le code de ${a.name}</h2><input id="pin1" class="search pin" inputmode="numeric" maxlength="4"><input id="pin2" class="search pin" inputmode="numeric" maxlength="4" style="margin-top:10px"><button class="btn primary" style="width:100%;margin-top:12px" onclick="confirmPin('${a.id}')">Enregistrer</button></div></div>`}function confirmPin(id){let p1=pin1.value,p2=pin2.value;if(!/^\d{4}$/.test(p1)||p1!==p2)return alert('Vérifiez les codes.');let a=accounts.find(x=>x.id===id);a.pin=p1;saveAccounts();openSession(a)}function askPin(a){document.getElementById('loginRoot').innerHTML=`<div class="login"><div class="login-card"><h2>Bonjour ${a.name}</h2><input id="pin" class="search pin" inputmode="numeric" maxlength="4"><button class="btn primary" style="width:100%;margin-top:12px" onclick="verifyPin('${a.id}')">Se connecter</button></div></div>`}function verifyPin(id){let a=accounts.find(x=>x.id===id);if(pin.value!==a.pin)return alert('Code incorrect.');openSession(a)}
function openSession(a){session={id:a.id,at:Date.now()};sessionStorage.setItem('jarvis-session',JSON.stringify(session));user=a;if(a.role==='employee'){location.href='employe.html';return}boot()}function logout(){sessionStorage.removeItem('jarvis-session');location.reload()}function allowed(k){return !!user?.rights?.[k]}
function pages(){let p=['Accueil'];if(allowed('quotes'))p.push('Devis');if(allowed('workshop'))p.push('Atelier');if(allowed('orders'))p.push('Commandes');if(allowed('tasks'))p.push('Tâches');if(allowed('direction'))p.push('Direction');return p}function nav(){document.getElementById('nav').innerHTML=pages().map(p=>`<button class="${p===page?'active':''}" onclick="go('${p}')">${p}</button>`).join('')}function go(p){page=p;render()}
function badge(v){let s=(v||'').toLowerCase(),c=s.includes('accept')||s.includes('valid')||s==='terminée'?'green':s.includes('refus')||s.includes('annul')||s.includes('bloqué')?'red':s.includes('attente')||s.includes('envoy')||s.includes('confirmer')?'yellow':'purple';return `<span class="badge ${c}">${v}</span>`}
function summaryText(){let pending=state.tasks.filter(t=>!t.done).length,quotes=state.quotes.filter(q=>!['Accepté','Refusé','Annulé'].includes(q.status)).length,orders=state.orders.filter(o=>!String(o.status).toLowerCase().includes('valid')).length,ints=state.interventions.length;return `${ints} intervention${ints>1?'s':''} prévue${ints>1?'s':''}, ${quotes} devis actif${quotes>1?'s':''}, ${orders} commande${orders>1?'s':''} à suivre et ${pending} tâche${pending>1?'s':''} en attente.`}
function renderAccueil(){let pending=state.tasks.filter(t=>!t.done).length;return `<div class="grid"><section class="card span-12 hero"><div><h2>Bonjour ${user.name}.</h2><p>${summaryText()}</p><div class="statusline"><span class="chip">● Jarvis opérationnel</span><span class="chip">✓ Données locales synchronisées</span><span class="chip">🛡 Aucun incident déclaré</span></div></div><button class="btn jarvis" onclick="briefing()">🔊 Briefing Jarvis</button></section><section class="card span-12"><div class="stats"><div class="stat" onclick="go('Tâches')"><span class="muted">Tâches</span><strong>${pending}</strong></div><div class="stat" onclick="go('Devis')"><span class="muted">Devis actifs</span><strong>${state.quotes.length}</strong></div><div class="stat" onclick="go('Commandes')"><span class="muted">Commandes</span><strong>${state.orders.length}</strong></div><div class="stat" onclick="go('Atelier')"><span class="muted">Interventions</span><strong>${state.interventions.length}</strong></div></div></section><section class="card span-8"><div class="section-title"><h3>Priorités du jour</h3><button class="btn small" onclick="go('Tâches')">Tout voir</button></div><div class="list">${state.tasks.filter(t=>!t.done).slice(0,5).map(t=>`<div class="item"><div><strong>${t.title}</strong><div class="muted">${t.domain||'Général'} • priorité ${t.priority||'normale'}</div></div>${badge(t.priority||'À faire')}</div>`).join('')||'<div class="muted">Aucune tâche urgente.</div>'}</div></section><section class="card span-4"><h3>État de l’atelier</h3><div class="list"><div class="item"><span>Planning</span><strong>Prêt</strong></div><div class="item"><span>Sécurité</span><strong>Aucun incident</strong></div><div class="item"><span>Jarvis</span><strong>Disponible</strong></div></div></section></div>`}
function quoteItem(q){let expiry=q.expiresAt?new Date(q.expiresAt+'T00:00:00').toLocaleDateString('fr-FR'):'Aucune';return `<div class="item"><div><div class="item-title">${q.vehicle} — ${Number(q.amount||0).toLocaleString('fr-FR')} € TTC</div><div class="muted">${q.client} • ${q.offer||''}</div><div class="muted">Échéance : ${expiry}</div></div><div class="quote-controls"><select onchange="updateQuoteStatus('${q.id}',this.value)">${['À valider','Prêt à envoyer','Envoyé','En attente de réponse','Accepté','Refusé','Annulé'].map(s=>`<option ${q.status===s?'selected':''}>${s}</option>`).join('')}</select><input type="date" value="${q.expiresAt||''}" onchange="updateQuoteExpiry('${q.id}',this.value)"><button class="btn small" onclick="openQuoteModal('${q.id}')">Modifier</button></div></div>`}
function renderDevis(){purgeExpiredQuotes();return `<div class="grid"><section class="card span-12"><div class="section-title"><h3>Devis</h3><button class="btn primary" onclick="openQuoteModal()">Ajouter un devis</button></div><div class="list">${state.quotes.map(quoteItem).join('')||'<div class="muted">Aucun devis actif.</div>'}</div></section></div>`}function updateQuoteStatus(id,status){let q=state.quotes.find(x=>x.id===id);if(!q)return;q.status=status;if(status==='Envoyé'&&!q.sentAt)q.sentAt=new Date().toISOString();log(`Statut du devis ${q.vehicle} : ${status}`);tone();render()}function updateQuoteExpiry(id,date){let q=state.quotes.find(x=>x.id===id);if(!q)return;q.expiresAt=date||null;save();render()}
function openQuoteModal(id=null){let q=id?state.quotes.find(x=>x.id===id):null;document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><h3>${q?'Modifier':'Ajouter'} un devis</h3><input id="qClient" class="search" placeholder="Client" value="${q?.client||''}"><input id="qVehicle" class="search" style="margin-top:8px" placeholder="Véhicule" value="${q?.vehicle||''}"><input id="qAmount" class="search" style="margin-top:8px" type="number" placeholder="Montant TTC" value="${q?.amount||''}"><input id="qOffer" class="search" style="margin-top:8px" placeholder="Offre / prestation" value="${q?.offer||''}"><input id="qExpiry" class="search" style="margin-top:8px" type="date" value="${q?.expiresAt||''}"><button class="btn primary" style="width:100%;margin-top:12px" onclick="saveQuote('${q?.id||''}')">Enregistrer</button>${q?`<button class="btn danger" style="width:100%;margin-top:8px" onclick="deleteQuote('${q.id}')">Supprimer</button>`:''}<button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">Annuler</button></div></div>`}function saveQuote(id){let q=id?state.quotes.find(x=>x.id===id):null,data={client:qClient.value.trim(),vehicle:qVehicle.value.trim(),amount:Number(qAmount.value||0),offer:qOffer.value.trim(),expiresAt:qExpiry.value||null};if(!data.client||!data.vehicle)return alert('Indiquez le client et le véhicule.');if(q)Object.assign(q,data);else state.quotes.unshift({id:crypto.randomUUID(),status:'À valider',sentAt:null,...data});log(`${q?'Devis modifié':'Devis créé'} : ${data.vehicle}`);tone();closeModal();render()}function deleteQuote(id){state.quotes=state.quotes.filter(x=>x.id!==id);save();closeModal();render()}
function renderAtelier(){return `<div class="grid"><section class="card span-12"><div class="section-title"><h3>Atelier</h3><div class="actions"><a class="btn primary" href="planning-atelier.html">Planning du jour</a><a class="btn" href="employe.html">Mode employé</a></div></div><div class="list">${state.interventions.map(i=>`<div class="item"><div><strong>${i.vehicle}</strong><div class="muted">${i.client} • ${new Date(i.date).toLocaleDateString('fr-FR')}</div></div>${badge(i.status)}</div>`).join('')}</div></section></div>`}function renderCommandes(){return `<div class="grid"><section class="card span-12"><h3>Commandes</h3><div class="list">${state.orders.map(o=>`<div class="item"><div><strong>${o.label} — ${o.supplier}</strong><div class="muted">${o.detail}</div></div>${badge(o.status)}</div>`).join('')}</div></section></div>`}function renderTasks(){return `<div class="grid"><section class="card span-12"><h3>Tâches</h3><div class="list">${state.tasks.map(t=>`<div class="item"><div><strong>${t.done?'✓ ':''}${t.title}</strong></div><button class="btn small" onclick="toggleTask('${t.id}')">${t.done?'Rouvrir':'Terminer'}</button></div>`).join('')}</div></section></div>`}function toggleTask(id){let t=state.tasks.find(x=>x.id===id);t.done=!t.done;log(`Tâche ${t.done?'terminée':'rouverte'} : ${t.title}`);tone();if(t.done)speak('Très bien. Tâche terminée. Merci pour votre travail.');render()}function renderDirection(){return `<div class="grid"><section class="card span-6"><h3>Journal</h3><div class="list">${state.journal.slice(0,20).map(j=>`<div class="item"><div>${j.text}<div class="muted">${new Date(j.at).toLocaleString('fr-FR')}</div></div></div>`).join('')}</div></section><section class="card span-6"><h3>Utilisateurs</h3><div class="list">${accounts.map(a=>`<div class="item"><strong>${a.name}</strong><span class="muted">${a.role==='direction'?'Direction':'Employé'}</span></div>`).join('')}</div></section></div>`}
function render(){nav();let map={Accueil:renderAccueil,Devis:renderDevis,Atelier:renderAtelier,Commandes:renderCommandes,Tâches:renderTasks,Direction:renderDirection};document.getElementById('content').innerHTML=(map[page]||renderAccueil)()}function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function briefing(){tone('start');speak(`Bonjour ${user.name}. ${summaryText()} Aucun incident de sécurité n’est signalé. Je suis prêt.`)}function firstGreeting(){let key='gcos-greeting-'+user.id+'-'+new Date().toISOString().slice(0,10);if(localStorage.getItem(key))return;localStorage.setItem(key,'1');setTimeout(()=>{tone('start');let h=new Date().getHours(),part=h<12?'Bonjour':h<18?'Bon après-midi':'Bonsoir';speak(`${part} ${user.name}. Ravi de vous retrouver. ${summaryText()} Je reste à votre disposition.`)},500)}function endDay(){tone();speak(`Merci ${user.name}. Toutes les données de la journée sont enregistrées. Reposez-vous bien et à demain.`);localStorage.setItem('gcos-endday-'+user.id,new Date().toISOString())}
function jarvis(){tone();let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){speak('La reconnaissance vocale n’est pas disponible sur cet appareil.');return}let r=new SR();r.lang='fr-FR';r.onresult=e=>{let q=e.results[0][0].transcript.toLowerCase();if(/urgence|malaise|agression|incendie/.test(q))return triggerEmergency(q);if(q.includes('devis'))go('Devis');else if(q.includes('atelier'))go('Atelier');else if(q.includes('commande'))go('Commandes');else if(q.includes('tâche'))go('Tâches');else if(q.includes('briefing')||q.includes('résumé'))briefing();else if(q.includes('fin de journée')||q.includes('au revoir'))endDay();else speak('Je vous écoute. Précisez la fonction que vous souhaitez ouvrir.')};r.start()}
function openContact(){let names=accounts.map(a=>a.name).join(', ');document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><h3>💬 Contacter l’équipe</h3><p class="muted">Personnes disponibles : ${names}</p><textarea id="msg" class="search" placeholder="Votre message"></textarea><button class="btn primary" style="width:100%;margin-top:12px" onclick="sendInternalMessage()">Envoyer à l’équipe</button><button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">Fermer</button></div></div>`}function sendInternalMessage(){let m=msg.value.trim();if(!m)return;localStorage.setItem('gcos-internal-message',JSON.stringify({from:user.name,to:'all',message:m,at:new Date().toISOString()}));tone();speak('Message envoyé à l’équipe.');closeModal()}
function triggerAssistance(){let payload={type:'assistance',from:user?.name||'Direction',message:'Assistance demandée à l’atelier.',at:new Date().toISOString()};localStorage.setItem('gcos-priority-alert',JSON.stringify(payload));tone('urgent');speak('Assistance demandée à l’atelier. La première personne disponible est invitée à répondre.');alert('Assistance diffusée à toutes les interfaces GCOS ouvertes sur cet appareil.')}
function confirmEmergency(){if(confirm('Déclencher l’URGENCE GÉNÉRALE ?'))triggerEmergency('urgence générale')}
function triggerEmergency(reason){let payload={id:crypto.randomUUID?crypto.randomUUID():Date.now().toString(),type:'emergency',from:user?.name||'Utilisateur',message:reason||'Urgence générale',at:new Date().toISOString(),ack:false};localStorage.setItem('gcos-priority-alert',JSON.stringify(payload));localStorage.setItem('gcos-email-followup-needed',JSON.stringify({...payload,dueAt:new Date(Date.now()+120000).toISOString()}));showEmergency(payload)}function showEmergency(a){document.getElementById('alertText').textContent=`Déclenchée par ${a.from||'un utilisateur'} — ${a.message}`;document.getElementById('alertScreen').classList.add('open');startAlarm();speak(`Urgence générale. ${a.message}. Appelez immédiatement les secours si nécessaire.`);if('Notification'in window&&Notification.permission==='granted')new Notification('URGENCE GCOS',{body:a.message})}function startAlarm(){stopAlarm();tone('urgent');let c=new(window.AudioContext||window.webkitAudioContext)();alarmTimer=setInterval(()=>{let o=c.createOscillator(),g=c.createGain();o.frequency.value=880;g.gain.value=.18;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.22)},500)}function stopAlarm(){if(alarmTimer){clearInterval(alarmTimer);alarmTimer=null}}function ackEmergency(){stopAlarm();document.getElementById('alertScreen').classList.remove('open');let a=JSON.parse(localStorage.getItem('gcos-priority-alert')||'null');if(a){a.ack=true;a.ackAt=new Date().toISOString();localStorage.setItem('gcos-priority-alert',JSON.stringify(a))}speak('Alerte prise en compte.')}
function boot(){migrateQuotes();document.getElementById('loginRoot').innerHTML='';document.getElementById('app').hidden=false;document.getElementById('currentUser').textContent=user.name;document.getElementById('today').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});document.getElementById('jarvisBtn').onclick=jarvis;window.addEventListener('storage',e=>{if(e.key==='gcos-priority-alert'&&e.newValue){let a=JSON.parse(e.newValue);if(a.type==='emergency')showEmergency(a)}});if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();render();firstGreeting()}
if(session){user=accounts.find(a=>a.id===session.id);if(user){if(user.role==='employee')location.href='employe.html';else boot()}else startLogin()}else startLogin();
</script></body></html>
