<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>GCOS — GentleCarE</title><style>:root{--p:#171a21;--p2:#20242d;--t:#f7f7f8;--m:#a9afbd;--y:#ffd400;--r:#ef4444;--bd:#303641}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#1d2530,#0b0d11 45%);color:var(--t);font-family:system-ui}.app{max-width:1200px;margin:auto;padding:18px 18px 130px}.top,.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--bd);background:var(--p2);color:var(--t);border-radius:12px;padding:10px 14px;text-decoration:none;cursor:pointer}.primary{background:var(--y);color:#111;font-weight:900}.danger{background:#941717}.card{background:rgba(23,26,33,.97);border:1px solid var(--bd);border-radius:18px;padding:16px;margin:13px 0}.hero{background:linear-gradient(135deg,#0b557e99,var(--p))}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:var(--p2);padding:15px;border-radius:14px}.stat strong{display:block;font-size:1.6rem}.muted{color:var(--m)}.logo{width:58px;background:white;border-radius:13px;padding:4px}.login{position:fixed;inset:0;background:#090b0fee;display:grid;place-items:center;padding:18px;z-index:20}.loginbox{width:min(760px,100%);background:var(--p);border:1px solid var(--bd);border-radius:20px;padding:22px}.profiles{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.profile{background:var(--p2);color:var(--t);border:1px solid var(--bd);border-radius:15px;padding:18px;font-weight:900}.pin{width:100%;background:#101319;color:var(--t);border:1px solid var(--bd);border-radius:11px;padding:13px;text-align:center;font-size:1.4rem}.bar{position:fixed;bottom:0;left:0;right:0;background:#0f1116;border-top:1px solid var(--bd);padding:10px;display:flex;gap:8px;justify-content:center;z-index:1000}.bar .btn{flex:1;max-width:280px}@media(max-width:700px){.top{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr 1fr}.profiles{grid-template-columns:1fr}.app{padding-bottom:190px}}</style></head><body><div id="loginRoot"></div><div class="app" id="app" hidden><header class="top"><div class="row"><img class="logo" src="icon.svg"><div><strong>GCOS — GentleCarE</strong><div id="today" class="muted"></div></div></div><div class="actions"><strong id="currentUser"></strong><button class="btn" onclick="endDay()">🌙 Fin de journée</button><button class="btn" onclick="logout()">Déconnexion</button></div></header><section class="card hero"><h1 id="welcome"></h1><p id="summary"></p><div class="actions"><a class="btn primary" href="planning.html">📅 Planning atelier</a><a class="btn" href="employe.html">🔧 Mode atelier</a><a class="btn" id="adminLink" href="admin.html">🧭 Centre de pilotage</a><a class="btn" id="gestionLink" href="gestion.html" target="_blank">💼 Gestion ↗</a></div></section><section class="card"><h2>Salle de contrôle</h2><div class="grid"><div class="stat"><span class="muted">Interventions</span><strong id="nInterventions">0</strong></div><div class="stat"><span class="muted">Devis</span><strong id="nQuotes">0</strong></div><div class="stat"><span class="muted">Commandes</span><strong id="nOrders">0</strong></div><div class="stat"><span class="muted">À facturer</span><strong id="nBilling">0</strong></div></div></section><section class="card"><h2>Accès rapides</h2><div class="actions"><a class="btn primary" href="planning.html">Planning</a><a class="btn" href="employe.html">Intervention</a><a class="btn" href="jarvis.html">🎙 Parler à Jarvis</a></div></section></div><div class="bar"><button class="btn" onclick="GCOSComms.message()">💬 Contacter</button><button class="btn" onclick="GCOSComms.assistance()">🟠 Assistance</button><button class="btn danger" onclick="GCOSComms.emergency()">🚨 Urgence</button></div><script>const defaults=[{id:'david',name:'David',role:'direction',pin:null},{id:'bene',name:'Bénédicte',role:'direction',pin:null},{id:'severine',name:'Séverine',role:'employee',pin:null},{id:'apprenti',name:'Apprenti',role:'employee',pin:null}];let stored=JSON.parse(localStorage.getItem('jarvis-accounts')||'[]'),map=new Map(stored.map(a=>[a.id,a]));defaults.forEach(a=>{let old=map.get(a.id)||{};map.set(a.id,{...a,...old,name:a.name,role:a.role})});let accounts=[...map.values()].filter(a=>defaults.some(d=>d.id===a.id));localStorage.setItem('jarvis-accounts',JSON.stringify(accounts));let state=JSON.parse(localStorage.getItem('gcos-state')||'null')||{tasks:[],quotes:[],orders:[],interventions:[]},session=JSON.parse(sessionStorage.getItem('jarvis-session')||'null'),user=null;function speak(t){if(!('speechSynthesis'in window))return;let u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';speechSynthesis.cancel();speechSynthesis.speak(u)}function jarvisSound(){try{let C=window.AudioContext||window.webkitAudioContext,c=new C(),notes=[392,523,659,784];notes.forEach((f,i)=>{let o=c.createOscillator(),g=c.createGain();o.frequency.value=f;g.gain.value=.055;o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.11);o.stop(c.currentTime+i*.11+.1)})}catch(e){}}function startLogin(){app.hidden=true;loginRoot.innerHTML='<div class="login"><div class="loginbox"><div class="row"><img class="logo" src="icon.svg"><div><h2>Choisissez votre profil</h2><div class="muted">Chaque personne utilise son propre accès.</div></div></div><div class="profiles" style="margin-top:18px">'+accounts.map(a=>'<button class="profile" onclick="selectAccount(\''+a.id+'\')">👤 '+a.name+'<br><span class="muted">'+(a.role==='direction'?'Direction':'Employé')+'</span></button>').join('')+'</div></div></div>'}function selectAccount(id){let a=accounts.find(x=>x.id===id);if(!a.pin)return setupPin(a);askPin(a)}function setupPin(a){loginRoot.innerHTML='<div class="login"><div class="loginbox"><h2>Créer le code de '+a.name+'</h2><input id="p1" class="pin" inputmode="numeric" maxlength="4" placeholder="4 chiffres"><input id="p2" class="pin" inputmode="numeric" maxlength="4" placeholder="Confirmer" style="margin-top:8px"><button class="btn primary" style="width:100%;margin-top:10px" onclick="savePin(\''+a.id+'\')">Enregistrer</button></div></div>'}function savePin(id){if(!/^\d{4}$/.test(p1.value)||p1.value!==p2.value)return alert('Vérifiez les codes.');let a=accounts.find(x=>x.id===id);a.pin=p1.value;localStorage.setItem('jarvis-accounts',JSON.stringify(accounts));openSession(a)}function askPin(a){loginRoot.innerHTML='<div class="login"><div class="loginbox"><h2>Bonjour '+a.name+'</h2><input id="pin" class="pin" inputmode="numeric" maxlength="4"><button class="btn primary" style="width:100%;margin-top:10px" onclick="verify(\''+a.id+'\')">Se connecter</button></div></div>'}function verify(id){let a=accounts.find(x=>x.id===id);if(pin.value!==a.pin)return alert('Code incorrect.');openSession(a)}function openSession(a){session={id:a.id,at:Date.now()};sessionStorage.setItem('jarvis-session',JSON.stringify(session));user=a;jarvisSound();setTimeout(()=>speak('Accès reconnu. Bonjour '+a.name+'.'),380);setTimeout(()=>{if(a.role==='employee')location.href='employe.html';else boot()},950)}function boot(){loginRoot.innerHTML='';app.hidden=false;today.textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});currentUser.textContent=user.name;welcome.textContent='Bonjour '+user.name+'.';let ni=state.interventions?.length||0,nq=state.quotes?.length||0,no=state.orders?.length||0,nb=(JSON.parse(localStorage.getItem('gcos-billing-queue')||'[]')).filter(x=>x.status==='À facturer').length;nInterventions.textContent=ni;nQuotes.textContent=nq;nOrders.textContent=no;nBilling.textContent=nb;summary.textContent=ni+' intervention'+(ni>1?'s':'')+', '+nq+' devis, '+no+' commande'+(no>1?'s':'')+' et '+nb+' dossier'+(nb>1?'s':'')+' à facturer.';adminLink.hidden=user.role!=='direction';gestionLink.hidden=user.role!=='direction'}function logout(){sessionStorage.removeItem('jarvis-session');location.reload()}function endDay(){speak('Au revoir '+user.name+'. Reposez-vous bien.');setTimeout(logout,900)}if(session){user=accounts.find(a=>a.id===session.id);user?user.role==='employee'?location.href='employe.html':boot():startLogin()}else startLogin();</script><script src="gcos-comms.js?v=5"></script></body></html>
