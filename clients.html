<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GCOS — Clients et véhicules</title><style>:root{--bg:#0d0f13;--p:#171a21;--p2:#20242d;--t:#f7f7f8;--m:#a9afbd;--y:#ffd400;--bd:#303641;--ok:#35c46a;--bad:#ff6262}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:system-ui}.app{max-width:1250px;margin:auto;padding:18px}.top,.row,.actions{display:flex;gap:10px;align-items:center}.top,.row{justify-content:space-between}.actions{flex-wrap:wrap}.card{background:var(--p);border:1px solid var(--bd);border-radius:18px;padding:16px;margin:13px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.btn,input,select,textarea{border:1px solid var(--bd);background:var(--p2);color:var(--t);border-radius:12px;padding:11px 13px}.btn{text-decoration:none;cursor:pointer}.primary{background:var(--y);color:#111;font-weight:900}.danger{border-color:#713838;color:#ff9b9b}.muted{color:var(--m)}label{display:grid;gap:6px;font-size:.9rem}.form{display:grid;grid-template-columns:1fr 1fr;gap:10px}.wide{grid-column:1/-1}.list{display:grid;gap:10px}.item{background:var(--p2);border:1px solid var(--bd);border-radius:14px;padding:13px}.item strong{font-size:1.05rem}.badge{display:inline-block;border-radius:999px;padding:3px 8px;background:#2b313c;color:var(--m);font-size:.78rem}.search{width:100%}.empty{text-align:center;padding:25px;color:var(--m)}@media(max-width:850px){.grid,.form{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.app{padding:12px 12px 85px}.actions .btn{flex:1;text-align:center}}</style></head><body><div class="app"><header class="top"><div><h1>Clients et véhicules</h1><div class="muted" id="who"></div></div><div class="actions"><a class="btn" href="admin.html">Administration</a><a class="btn" href="index.html">Accueil</a></div></header><div class="grid"><section class="card"><h2>Nouveau client</h2><form id="clientForm" class="form"><input type="hidden" id="clientId"><label>Nom complet<input id="name" required></label><label>Téléphone<input id="phone" inputmode="tel"></label><label>E-mail<input id="email" type="email"></label><label>Type<select id="type"><option>Particulier</option><option>Entreprise</option><option>Club</option><option>Partenaire</option></select></label><label class="wide">Adresse<input id="address"></label><label class="wide">Notes<textarea id="notes" rows="3"></textarea></label><div class="actions wide"><button class="btn primary" type="submit">Enregistrer le client</button><button class="btn" type="button" onclick="resetClient()">Nouveau</button></div></form></section><section class="card"><h2>Ajouter un véhicule</h2><form id="vehicleForm" class="form"><input type="hidden" id="vehicleId"><label>Client<select id="ownerId" required></select></label><label>Immatriculation<input id="plate" required></label><label>Marque<input id="brand"></label><label>Modèle<input id="model"></label><label>Année<input id="year" inputmode="numeric"></label><label>Kilométrage<input id="mileage" inputmode="numeric"></label><label class="wide">Notes techniques<textarea id="vehicleNotes" rows="3"></textarea></label><div class="actions wide"><button class="btn primary" type="submit">Enregistrer le véhicule</button><button class="btn" type="button" onclick="resetVehicle()">Nouveau</button></div></form></section></div><section class="card"><div class="row"><div><h2>Registre client</h2><div class="muted" id="count"></div></div></div><input class="search" id="search" placeholder="Rechercher un nom, téléphone, e-mail ou véhicule"><div id="list" class="list" style="margin-top:12px"></div></section></div><script src="storage.js"></script><script>const session=JSON.parse(sessionStorage.getItem('jarvis-session')||'null'),accounts=JSON.parse(localStorage.getItem('jarvis-accounts')||'[]'),user=accounts.find(a=>a.id===session?.id);if(!user||user.role!=='direction')location.href='index.html';who.textContent='Accès direction : '+user.name;let clients=[],vehicles=[];const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));async function load(){clients=await JarvisStorage.all('clients');vehicles=await JarvisStorage.all('vehicles');clients.sort((a,b)=>(a.name||'').localeCompare(b.name||''));ownerId.innerHTML='<option value="">Choisir un client</option>'+clients.map(c=>'<option value="'+c.id+'">'+esc(c.name)+'</option>').join('');render()}function render(){const q=search.value.trim().toLowerCase();const rows=clients.filter(c=>{const vs=vehicles.filter(v=>v.clientId===c.id);return [c.name,c.phone,c.email,c.type,...vs.flatMap(v=>[v.plate,v.brand,v.model])].join(' ').toLowerCase().includes(q)});count.textContent=clients.length+' client(s) • '+vehicles.length+' véhicule(s)';list.innerHTML=rows.length?rows.map(c=>{const vs=vehicles.filter(v=>v.clientId===c.id);return '<article class="item"><div class="row"><div><strong>'+esc(c.name)+'</strong> <span class="badge">'+esc(c.type||'Client')+'</span><div class="muted">'+esc(c.phone||'Sans téléphone')+(c.email?' • '+esc(c.email):'')+'</div></div><div class="actions"><button class="btn" onclick="editClient(\''+c.id+'\')">Modifier</button><button class="btn danger" onclick="deleteClient(\''+c.id+'\')">Supprimer</button></div></div><div style="margin-top:10px">'+(vs.length?vs.map(v=>'<div class="item"><div class="row"><div><strong>'+esc([v.brand,v.model].filter(Boolean).join(' ')||'Véhicule')+'</strong><div class="muted">'+esc(v.plate)+(v.year?' • '+esc(v.year):'')+(v.mileage?' • '+esc(v.mileage)+' km':'')+'</div></div><div class="actions"><button class="btn" onclick="editVehicle(\''+v.id+'\')">Modifier</button><button class="btn danger" onclick="deleteVehicle(\''+v.id+'\')">Supprimer</button></div></div></div>').join(''):'<div class="muted">Aucun véhicule enregistré.</div>')+'</div></article>'}).join(''):'<div class="empty">Aucun résultat.</div>'}clientForm.onsubmit=async e=>{e.preventDefault();await JarvisStorage.put('clients',{id:clientId.value||undefined,name:name.value.trim(),phone:phone.value.trim(),email:email.value.trim(),type:type.value,address:address.value.trim(),notes:notes.value.trim(),createdAt:clientId.value?(clients.find(x=>x.id===clientId.value)?.createdAt||new Date().toISOString()):new Date().toISOString()});resetClient();await load()};vehicleForm.onsubmit=async e=>{e.preventDefault();await JarvisStorage.put('vehicles',{id:vehicleId.value||undefined,clientId:ownerId.value,plate:plate.value.trim().toUpperCase(),brand:brand.value.trim(),model:model.value.trim(),year:year.value.trim(),mileage:mileage.value.trim(),notes:vehicleNotes.value.trim(),createdAt:vehicleId.value?(vehicles.find(x=>x.id===vehicleId.value)?.createdAt||new Date().toISOString()):new Date().toISOString()});resetVehicle();await load()};search.oninput=render;function editClient(id){const c=clients.find(x=>x.id===id);if(!c)return;clientId.value=c.id;name.value=c.name||'';phone.value=c.phone||'';email.value=c.email||'';type.value=c.type||'Particulier';address.value=c.address||'';notes.value=c.notes||'';scrollTo({top:0,behavior:'smooth'})}function editVehicle(id){const v=vehicles.find(x=>x.id===id);if(!v)return;vehicleId.value=v.id;ownerId.value=v.clientId||'';plate.value=v.plate||'';brand.value=v.brand||'';model.value=v.model||'';year.value=v.year||'';mileage.value=v.mileage||'';vehicleNotes.value=v.notes||'';scrollTo({top:0,behavior:'smooth'})}async function deleteClient(id){if(!confirm('Supprimer ce client et ses véhicules ?'))return;for(const v of vehicles.filter(x=>x.clientId===id))await JarvisStorage.remove('vehicles',v.id);await JarvisStorage.remove('clients',id);await load()}async function deleteVehicle(id){if(!confirm('Supprimer ce véhicule ?'))return;await JarvisStorage.remove('vehicles',id);await load()}function resetClient(){clientForm.reset();clientId.value=''}function resetVehicle(){vehicleForm.reset();vehicleId.value=''}load();</script></body></html>
