<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#031019"><title>Lancement MAVIK 0.41.1</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;background:radial-gradient(circle at 50% 0,#0b4051,#031019 58%);color:white;font-family:Inter,system-ui,sans-serif}.box{width:min(680px,100%);border:1px solid #286079;border-radius:22px;background:#071a27;padding:22px;text-align:center;box-shadow:0 25px 80px #0009}.logo{width:190px;max-width:70%;background:white;border-radius:14px;padding:4px}.log{margin-top:15px;border:1px solid #24566b;border-radius:12px;background:#020b11;padding:13px;text-align:left;white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:.78rem;min-height:125px}.bar{height:12px;border-radius:999px;background:#102f3e;overflow:hidden;margin-top:14px}.bar span{display:block;width:5%;height:100%;background:linear-gradient(90deg,#19d8ef,#46e36d);transition:width .25s}button,a{display:inline-block;margin-top:12px;border:1px solid #2c6177;border-radius:11px;background:#0b2a3b;color:white;padding:12px;text-decoration:none;cursor:pointer}.primary{background:#28603d;border-color:#4e9965;font-weight:900}</style></head><body><main class="box"><img class="logo" src="assets/brand/gentlecare-logo.png" alt="GentleCarE"><h1>Lancement MAVIK 0.41.1</h1><p>Ce lanceur contourne entièrement l’ancien index et le service worker responsable des écrans blancs.</p><div class="bar"><span id="bar"></span></div><div class="log" id="log">Préparation…</div><button class="primary" id="retry">Relancer</button><br><a href="mavik-0411.html?manual=1">Ouvrir directement</a></main><script>const log=document.getElementById('log'),bar=document.getElementById('bar'),write=t=>{log.textContent+='\n'+t;log.scrollTop=log.scrollHeight};let running=false;async function launch(){if(running)return;running=true;document.getElementById('retry').disabled=true;try{bar.style.width='25%';if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));write('✓ Service worker désactivé');}bar.style.width='55%';if('caches'in window){const names=await caches.keys();await Promise.all(names.map(n=>caches.delete(n)));write('✓ Caches techniques supprimés : '+(names.join(', ')||'aucun'));}bar.style.width='80%';const r=await fetch('mavik-0411.html?fresh='+Date.now(),{cache:'no-store'});write('✓ Point d’entrée autonome : HTTP '+r.status);if(!r.ok)throw new Error('Le fichier autonome n’est pas encore publié.');bar.style.width='100%';write('✓ Ouverture de MAVIK autonome…');setTimeout(()=>location.replace('mavik-0411.html?launched='+Date.now()),600)}catch(e){write('✗ '+e.message);running=false;document.getElementById('retry').disabled=false;bar.style.width='10%'}}document.getElementById('retry').onclick=launch;setTimeout(launch,250);</script></body></html>
