<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#111318"><title>Messagerie interne — Jarvis GentleCarE</title><style>:root{--p:#171a21;--p2:#20242d;--t:#f7f7f8;--m:#a9afbd;--y:#ffd400;--b:#303641;--g:#22c55e}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0b0d11,#12151b);color:var(--t);font-family:Inter,system-ui,sans-serif;min-height:100vh}.app{max-width:900px;margin:auto;padding:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:15px}.card{background:var(--p);border:1px solid var(--b);border-radius:18px;padding:16px;margin-bottom:14px}.btn,input,textarea,select{font:inherit}.btn{display:inline-block;border:1px solid var(--b);background:var(--p2);color:var(--t);padding:10px 14px;border-radius:12px;text-decoration:none}.primary{background:var(--y);color:#111;border-color:var(--y);font-weight:900}.muted{color:var(--m)}.msg{background:var(--p2);border-radius:14px;padding:13px;margin-top:10px}.msg.new{border-left:5px solid var(--y)}textarea,select{width:100%;background:#101319;color:var(--t);border:1px solid var(--b);border-radius:12px;padding:12px;margin-top:8px}.reply{border-left:3px solid var(--g);padding-left:10px;margin-top:9px}.actions{display:flex;gap:8px;flex-wrap:wrap}.badge{display:inline-block;background:#123e23;color:#76ef9d;padding:4px 8px;border-radius:999px;font-size:.8rem;font-weight:800}@media(max-width:600px){.top{align-items:flex-start;flex-direction:column}.actions .btn{flex:1}}</style></head><body><div class="app"><div class="top"><div><h1 style="margin:0">💬 Messagerie interne</h1><div class="muted" id="who"></div></div><div class="actions"><a class="btn" id="back">Retour</a><button class="btn" onclick="logout()">Déconnexion</button></div></div><section class="card"><h2>Nouveau message</h2><select id="to"></select><textarea id="body" placeholder="Écrivez votre message…"></textarea><button class="btn primary" style="margin-top:10px" onclick="sendMessage()">Envoyer</button></section><section class="card"><h2>Messages</h2><div id="messages"></div></section></div><script>let accounts=JSON.parse(localStorage.getItem('jarvis-accounts')||'[]'),session=JSON.parse(sessionStorage.getItem('jarvis-session')||'null'),user=accounts.find(a=>a.id===session?.id);if(!user)location.href='index.html';document.getElementById('who').textContent=`Connecté : ${user?.name||''}`;document.getElementById('back').href=user?.role==='employee'?'employe.html':'index.html';function all(){return JSON.parse(localStorage.getItem('gcos-internal-messages')||'[]')}function save(v){localStorage.setItem('gcos-internal-messages',JSON.stringify(v))}function logout(){sessionStorage.removeItem('jarvis-session');location.href='index.html'}function initRecipients(){let opts=[];if(user.role==='employee'){opts.push(['direction','Bénédicte et David'])}else{opts.push(['all-employees','Tous les employés']);accounts.filter(a=>a.role==='employee').forEach(a=>opts.push([a.id,a.name]))}document.getElementById('to').innerHTML=opts.map(x=>`<option value="${x[0]}">${x[1]}</option>`).join('')}function sendMessage(){let body=document.getElementById('body').value.trim();if(!body)return;let target=document.getElementById('to').value,to=target==='direction'?['david','bene']:target==='all-employees'?accounts.filter(a=>a.role==='employee').map(a=>a.id):[target],m=all();m.unshift({id:crypto.randomUUID(),from:user.name,fromId:user.id,fromRole:user.role,to,subject:'Message interne',body,at:new Date().toISOString(),status:'Nouveau',replies:[]});save(m);document.getElementById('body').value='';render()}function visible(m){return m.fromId===user.id||m.from===user.name||(m.to||[]).includes(user.id)||(user.role==='direction'&&m.fromRole==='employee')}function reply(id){let text=prompt('Votre réponse :');if(!text)return;let m=all(),x=m.find(a=>a.id===id);if(!x)return;x.replies=x.replies||[];x.replies.push({from:user.name,fromId:user.id,text,at:new Date().toISOString()});x.status='Répondu';save(m);render()}function markRead(id){let m=all(),x=m.find(a=>a.id===id);if(x){x.status='Lu';save(m);render()}}function render(){let rows=all().filter(visible);document.getElementById('messages').innerHTML=rows.map(m=>`<div class="msg ${m.status==='Nouveau'?'new':''}"><div><strong>${m.subject||'Message'}</strong> <span class="badge">${m.status||''}</span></div><div class="muted">De ${m.from} • ${new Date(m.at).toLocaleString('fr-FR')}</div><p>${m.body}</p>${m.vehicle?`<div class="muted">Véhicule : ${m.vehicle}${m.task?' • Tâche : '+m.task:''}</div>`:''}${(m.replies||[]).map(r=>`<div class="reply"><strong>${r.from}</strong> — ${r.text}<div class="muted">${new Date(r.at).toLocaleString('fr-FR')}</div></div>`).join('')}<div class="actions"><button class="btn" onclick="reply('${m.id}')">Répondre</button>${m.status==='Nouveau'?`<button class="btn" onclick="markRead('${m.id}')">Marquer lu</button>`:''}</div></div>`).join('')||'<p class="muted">Aucun message.</p>'}initRecipients();render();</script></body></html>
