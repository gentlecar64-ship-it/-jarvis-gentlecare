<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#031019"><title>MAVIK — Mise à jour 0.39.1</title><style>:root{--bg:#031019;--panel:#071a27;--line:#24566b;--text:#f5fbff;--muted:#91adba;--green:#46e36d;--cyan:#19d8ef;--amber:#ffb000}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;background:radial-gradient(circle at 50% 0,#0b4051,#031019 55%);color:var(--text);font-family:Inter,system-ui,sans-serif}.box{width:min(760px,100%);border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,#092331,#05151f);padding:22px;box-shadow:0 25px 80px #0009}.logo{display:block;width:190px;max-width:70%;margin:auto;background:white;border-radius:14px;padding:4px}h1{text-align:center;margin-bottom:5px}.muted{color:var(--muted);text-align:center}.status{border:1px solid var(--line);border-radius:13px;background:#031019;padding:13px;margin-top:15px;white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:.78rem;max-height:290px;overflow:auto}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:15px}button,a{border:1px solid #2c6177;border-radius:11px;background:#0b2a3b;color:white;padding:12px;text-align:center;text-decoration:none;cursor:pointer;font:inherit}.primary{background:#28603d;border-color:#4e9965;font-weight:900}.note{margin-top:14px;border:1px solid #3b7c52;border-radius:12px;background:#102b1d;padding:12px;color:#c7f4d2}@media(max-width:600px){.actions{grid-template-columns:1fr}}</style></head><body><main class="box"><img class="logo" src="assets/brand/gentlecare-logo.png" alt="GentleCarE"><h1>Correction MAVIK GCOS 0.39.1</h1><p class="muted">Suppression de la boucle de l’interface de secours.</p><div class="note">Cette correction supprime l’ancien cache <b>v3900</b>, installe <b>v3910</b> et conserve les comptes, dossiers, interventions et demandes d’amélioration.</div><div class="actions"><button class="primary" id="install">Installer la correction 0.39.1</button><button id="check">Contrôler les modules</button><a href="ameliorations.html">Dossier améliorations</a><a href="index.html">Retour à l’accueil</a></div><div class="status" id="log">Prêt à corriger MAVIK.</div></main><script>const log=document.getElementById('log');const write=t=>{log.textContent+='\n'+new Date().toLocaleTimeString('fr-FR')+' · '+t;log.scrollTop=log.scrollHeight};const modules=['index.html','planning.html','alpha/workshop/index.html','gestion.html','profil.html','ameliorations.html','mavik-stability.js?v=3910','version.json','health.json'];async function check(){log.textContent='Contrôle de MAVIK 0.39.1';for(const path of modules){try{const sep=path.includes('?')?'&':'?';const r=await fetch(path+sep+'update='+Date.now(),{cache:'no-store'});write(path+' : HTTP '+r.status+(r.ok?' OK':' ERREUR'));}catch(e){write(path+' : '+e.message)}}}async function install(){const b=document.getElementById('install');b.disabled=true;b.textContent='Correction en cours…';try{document.getElementById('mavik-rescue')?.remove();if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));write(regs.length+' ancien(s) service worker(s) supprimé(s).')}if('caches'in window){const names=await caches.keys();await Promise.all(names.map(n=>caches.delete(n)));write(names.length+' ancien(s) cache(s) supprimé(s).')}sessionStorage.removeItem('jarvis-booted');if('serviceWorker'in navigator){const reg=await navigator.serviceWorker.register('./service-worker.js?v=3910',{updateViaCache:'none'});await reg.update();if(reg.waiting)reg.waiting.postMessage({type:'SKIP_WAITING'});write('Service worker 0.39.1 installé.')}await check();write('Correction terminée. Ouverture de MAVIK.');setTimeout(()=>location.replace('index.html?updated=3910-'+Date.now()),700);}catch(e){write('ÉCHEC : '+e.message);b.disabled=false;b.textContent='Relancer la correction 0.39.1';}}document.getElementById('check').onclick=check;document.getElementById('install').onclick=install;check();</script><script src="mavik-stability.js?v=3910"></script></body></html>
