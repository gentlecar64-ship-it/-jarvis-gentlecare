<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#031019"><title>MAVIK — Mise à jour 0.43.0</title><style>:root{--bg:#031019;--line:#24566b;--text:#f5fbff;--muted:#91adba}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;background:radial-gradient(circle at 50% 0,#0b4051,#031019 55%);color:var(--text);font-family:Inter,system-ui,sans-serif}.box{width:min(860px,100%);border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,#092331,#05151f);padding:22px;box-shadow:0 25px 80px #0009}.logo{display:block;width:190px;max-width:70%;margin:auto;background:white;border-radius:14px;padding:4px}h1{text-align:center;margin-bottom:5px}.muted{color:var(--muted);text-align:center}.note{margin-top:14px;border:1px solid #3b7c52;border-radius:12px;background:#102b1d;padding:12px;color:#c7f4d2}.status{border:1px solid var(--line);border-radius:13px;background:#031019;padding:13px;margin-top:15px;white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:.78rem;max-height:360px;overflow:auto}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:15px}button,a{border:1px solid #2c6177;border-radius:11px;background:#0b2a3b;color:white;padding:12px;text-align:center;text-decoration:none;cursor:pointer;font:inherit}.primary{background:#28603d;border-color:#4e9965;font-weight:900}@media(max-width:600px){.actions{grid-template-columns:1fr}}</style></head><body><main class="box"><img class="logo" src="assets/brand/gentlecare-logo.png" alt="GentleCarE"><h1>Mise à jour MAVIK GCOS 0.43.0</h1><p class="muted">Poste Atelier kiosque, caméra Logitech et planning temps réel.</p><div class="note">Les dossiers, comptes et données locales sont conservés. Le cache 0.42.0 est supprimé et remplacé par 0.43.0.</div><div class="actions"><button class="primary" id="installButton">Installer MAVIK 0.43.0</button><button id="checkButton">Contrôler les composants</button><a href="fix-0430.html">Installation Poste Atelier</a><a href="alpha/workshop/index.html?station=atelier">Ouvrir le Poste Atelier</a></div><div class="status" id="log">Prêt à installer MAVIK 0.43.0.</div></main><script>const log=document.getElementById('log'),installButton=document.getElementById('installButton'),checkButton=document.getElementById('checkButton'),write=t=>{log.textContent+='\n'+new Date().toLocaleTimeString('fr-FR')+' · '+t;log.scrollTop=log.scrollHeight};const files=['mavik-autonomous.js?v=4200','mavik-autonomous.css?v=4200','jarvis-voice.js?v=4200','mavik-stability.js?v=4300','service-worker.js?v=4300','install.js?v=4300','alpha/workshop/index.html','alpha/workshop/station.js?v=4300','alpha/workshop/station.css?v=4300','planning.html','gestion.html','profil.html','devis.html','client.config.json','mavik.instance.lock.json','version.json','health.json'];async function runCheck(){log.textContent='Contrôle de MAVIK 0.43.0';for(const path of files){try{const sep=path.includes('?')?'&':'?';const response=await fetch(path+sep+'test='+Date.now(),{cache:'no-store'});write(path+' : HTTP '+response.status+(response.ok?' OK':' ERREUR'))}catch(error){write(path+' : '+error.message)}}}async function installNow(){installButton.disabled=true;installButton.textContent='Installation en cours…';try{if('serviceWorker'in navigator){const registrations=await navigator.serviceWorker.getRegistrations();await Promise.all(registrations.map(registration=>registration.unregister()));write(registrations.length+' ancien(s) service worker(s) supprimé(s).')}if('caches'in window){const names=await caches.keys();await Promise.all(names.map(name=>caches.delete(name)));write('Caches supprimés : '+(names.join(', ')||'aucun'))}if('serviceWorker'in navigator){const registration=await navigator.serviceWorker.register('./service-worker.js?v=4300&fresh='+Date.now(),{updateViaCache:'none'});await registration.update();if(registration.waiting)registration.waiting.postMessage({type:'SKIP_WAITING'});write('Service worker 0.43.0 installé.')}await runCheck();write('Installation terminée. Ouverture du Poste Atelier.');setTimeout(()=>location.replace('alpha/workshop/index.html?station=atelier&updated=4300-'+Date.now()),700)}catch(error){write('ÉCHEC : '+error.message);installButton.disabled=false;installButton.textContent='Relancer MAVIK 0.43.0'}}checkButton.onclick=runCheck;installButton.onclick=installNow;runCheck();</script></body></html>
