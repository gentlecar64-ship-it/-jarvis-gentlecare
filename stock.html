<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>GCOS — Stocks & fournisseurs</title><meta name="theme-color" content="#07131a"><style>:root{--bg:#061014;--panel:#0b1b22;--panel2:#102731;--line:#24424d;--txt:#f4fbfd;--muted:#87a1aa;--cyan:#57d7ef;--green:#79d45d;--amber:#f0b54a;--red:#ef6363}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#071318,#04090c);color:var(--txt);font-family:system-ui;min-height:100vh}.app{max-width:1400px;margin:auto;padding:18px}.top,.row{display:flex;justify-content:space-between;align-items:center;gap:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#10242c;color:var(--txt);border-radius:11px;padding:10px 13px;text-decoration:none;cursor:pointer}.primary{background:#245f3e;border-color:#438d60;font-weight:800}.danger{background:#4a2323}.card{border:1px solid var(--line);background:linear-gradient(180deg,#0d2028,#09171d);border-radius:18px;padding:16px;margin-top:14px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{padding:14px;border:1px solid var(--line);border-radius:14px;background:#0d2028}.stat strong{display:block;font-size:1.7rem;margin-top:7px}.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}.muted{color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);background:#07161c;color:var(--txt);border-radius:10px;padding:10px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.list{display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:13px;padding:12px;background:#0d2028}.item strong{display:block}.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:.75rem;background:#173d2c;color:#9df0b7}.badge.low{background:#4a3517;color:#ffd178}.badge.out{background:#4a2020;color:#ffaaaa}.tabs{display:flex;gap:8px;margin-top:14px}.tabs button.active{background:#245f3e}.hidden{display:none}@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.formgrid{grid-template-columns:1fr}.app{padding:12px 10px 80px}}@media(max-width:430px){.grid{grid-template-columns:1fr 1fr}.stat strong{font-size:1.35rem}}</style></head><body><div class="app"><header class="top"><div><h1>Stocks & fournisseurs</h1><div class="muted" id="who"></div></div><div class="actions"><a class="btn" href="admin.html">Administration</a><a class="btn" href="gestion.html">Gestion</a></div></header><section class="grid"><article class="stat"><span class="muted">Références</span><strong id="sItems">0</strong></article><article class="stat"><span class="muted">Alertes stock</span><strong id="sAlerts">0</strong></article><article class="stat"><span class="muted">Fournisseurs</span><strong id="sSuppliers">0</strong></article><article class="stat"><span class="muted">Valeur estimée</span><strong id="sValue">0 €</strong></article></section><div class="tabs"><button class="btn active" data-tab="stock">Stocks</button><button class="btn" data-tab="suppliers">Fournisseurs</button><button class="btn" data-tab="movements">Mouvements</button></div><section id="stockTab"><div class="layout"><article class="card"><h2>Ajouter une référence</h2><form id="stockForm" class="formgrid"><input name="name" placeholder="Produit" required><select name="category"><option>Glace carbonique</option><option>Dinitrol</option><option>Consommable</option><option>EPI</option><option>Pièce</option><option>Autre</option></select><input name="unit" placeholder="Unité (kg, L, pièce)" required><input name="quantity" type="number" step="0.01" min="0" placeholder="Quantité" required><input name="threshold" type="number" step="0.01" min="0" placeholder="Seuil d'alerte" required><input name="unitCost" type="number" step="0.01" min="0" placeholder="Coût unitaire HT"><select name="supplierId" id="stockSupplier"><option value="">Sans fournisseur</option></select><input name="location" placeholder="Emplacement"><button class="btn primary" type="submit">Enregistrer</button></form></article><article class="card"><div class="row"><h2>État du stock</h2><input id="stockSearch" placeholder="Rechercher" style="max-width:220px"></div><div id="stockList" class="list"></div></article></div></section><section id="suppliersTab" class="hidden"><div class="layout"><article class="card"><h2>Ajouter un fournisseur</h2><form id="supplierForm" class="formgrid"><input name="name" placeholder="Raison sociale" required><input name="contact" placeholder="Contact"><input name="email" type="email" placeholder="Email"><input name="phone" placeholder="Téléphone"><input name="category" placeholder="Catégorie"><textarea name="notes" placeholder="Notes"></textarea><button class="btn primary" type="submit">Enregistrer</button></form></article><article class="card"><h2>Fournisseurs enregistrés</h2><div id="supplierList" class="list"></div></article></div></section><section id="movementsTab" class="hidden"><article class="card"><h2>Mouvements récents</h2><div id="movementList" class="list"></div></article></section></div><script src="storage.js?v=22"></script><script>const session=JSON.parse(sessionStorage.getItem('jarvis-session')||'null'),accounts=JSON.parse(localStorage.getItem('jarvis-accounts')||'[]'),user=accounts.find(a=>a.id===session?.id);if(!user||user.role!=='direction')location.href='index.html';who.textContent='Accès administrateur : '+user.name;let stocks=[],suppliers=[],movements=[];const euro=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);async function load(){stocks=await JarvisStorage.all('stock');suppliers=await JarvisStorage.all('suppliers');movements=await JarvisStorage.all('stockMovements');render()}function render(){sItems.textContent=stocks.length;sSuppliers.textContent=suppliers.length;sAlerts.textContent=stocks.filter(x=>Number(x.quantity)<=Number(x.threshold)).length;sValue.textContent=euro(stocks.reduce((a,x)=>a+Number(x.quantity||0)*Number(x.unitCost||0),0));stockSupplier.innerHTML='<option value="">Sans fournisseur</option>'+suppliers.map(s=>'<option value="'+s.id+'">'+s.name+'</option>').join('');renderStocks();supplierList.innerHTML=suppliers.length?suppliers.map(s=>'<div class="item"><strong>'+s.name+'</strong><div>'+[s.contact,s.phone,s.email].filter(Boolean).join(' • ')+'</div><div class="muted">'+(s.category||'Fournisseur')+'</div><div class="actions" style="margin-top:8px"><button class="btn danger" onclick="delSupplier(\''+s.id+'\')">Supprimer</button></div></div>').join(''):'<div class="muted">Aucun fournisseur.</div>';movementList.innerHTML=movements.length?movements.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,50).map(m=>'<div class="item"><strong>'+m.itemName+'</strong><div>'+m.type+' : '+m.delta+' '+m.unit+'</div><div class="muted">'+new Date(m.createdAt).toLocaleString('fr-FR')+'</div></div>').join(''):'<div class="muted">Aucun mouvement.</div>'}function renderStocks(){const q=stockSearch.value.toLowerCase();const list=stocks.filter(x=>(x.name+' '+x.category).toLowerCase().includes(q));stockList.innerHTML=list.length?list.map(x=>{const state=Number(x.quantity)<=0?'out':Number(x.quantity)<=Number(x.threshold)?'low':'';const label=state==='out'?'Rupture':state==='low'?'À commander':'Disponible';return '<div class="item"><div class="row"><div><strong>'+x.name+'</strong><div class="muted">'+x.category+' • '+(x.location||'Emplacement non défini')+'</div></div><span class="badge '+state+'">'+label+'</span></div><h3>'+x.quantity+' '+x.unit+'</h3><div class="muted">Seuil : '+x.threshold+' '+x.unit+' • Valeur : '+euro(Number(x.quantity)*Number(x.unitCost||0))+'</div><div class="actions" style="margin-top:8px"><button class="btn" onclick="adjust(\''+x.id+'\',1)">Entrée</button><button class="btn" onclick="adjust(\''+x.id+'\',-1)">Sortie</button><button class="btn danger" onclick="delStock(\''+x.id+'\')">Supprimer</button></div></div>'}).join(''):'<div class="muted">Aucune référence.</div>'}stockForm.onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(stockForm));data.quantity=Number(data.quantity);data.threshold=Number(data.threshold);data.unitCost=Number(data.unitCost||0);await JarvisStorage.put('stock',data);stockForm.reset();await load()};supplierForm.onsubmit=async e=>{e.preventDefault();await JarvisStorage.put('suppliers',Object.fromEntries(new FormData(supplierForm)));supplierForm.reset();await load()};stockSearch.oninput=renderStocks;async function adjust(id,sign){const x=stocks.find(s=>s.id===id);const val=prompt(sign>0?'Quantité reçue':'Quantité utilisée');const qty=Number(val);if(!x||!qty||qty<0)return;x.quantity=Number(x.quantity)+sign*qty;if(x.quantity<0)x.quantity=0;await JarvisStorage.put('stock',x);await JarvisStorage.put('stockMovements',{itemId:x.id,itemName:x.name,type:sign>0?'Entrée':'Sortie',delta:(sign>0?'+':'-')+qty,unit:x.unit,createdAt:new Date().toISOString(),user:user.name});await load()}async function delStock(id){if(confirm('Supprimer cette référence ?')){await JarvisStorage.remove('stock',id);await load()}}async function delSupplier(id){if(confirm('Supprimer ce fournisseur ?')){await JarvisStorage.remove('suppliers',id);await load()}}document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.remove('active'));b.classList.add('active');stockTab.classList.toggle('hidden',b.dataset.tab!=='stock');suppliersTab.classList.toggle('hidden',b.dataset.tab!=='suppliers');movementsTab.classList.toggle('hidden',b.dataset.tab!=='movements')});load();</script></body></html>
