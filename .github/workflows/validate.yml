name: Validate MAVIK

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'feature/**'
      - 'hotfix/**'

permissions:
  contents: read

jobs:
  node-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax validation
        run: npm run check
      - name: Quote workflow smoke test
        run: node tests/quote-workflow-smoke.js
      - name: Reputation and client intake smoke test
        run: node tests/reputation-client-intake-smoke.js
      - name: Jarvis contextual intelligence smoke test
        run: node tests/jarvis-intelligence-smoke.js
      - name: Command dock internal messaging smoke test
        run: node tests/command-dock-messaging-smoke.js
      - name: Intervention reference report smoke test
        run: node tests/intervention-report-smoke.js
      - name: Quote studio and planning smoke test
        run: node tests/quote-studio-planning-smoke.js
      - name: Employee flow leave planning and Jarvis morale smoke test
        run: node tests/employee-flow-leave-morale-smoke.js
      - name: Emergency category quote request calendar and startup smoke test
        run: node tests/emergency-quote-request-calendar-smoke.js
