name: Validate MAVIK

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'feature/**'
      - 'hotfix/**'

permissions:
  contents: read

jobs:
  node-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax validation
        run: npm run check
      - name: Quote workflow smoke test
        run: node tests/quote-workflow-smoke.js
      - name: Reputation and client intake smoke test
        run: node tests/reputation-client-intake-smoke.js
