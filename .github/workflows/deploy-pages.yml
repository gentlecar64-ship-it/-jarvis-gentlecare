name: Deploy MAVIK GCOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  MAVIK_VERSION: "0.43.0"
  MAVIK_CORE_VERSION: "0.42.0-core.3"

concurrency:
  group: mavik-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate JavaScript
        run: |
          node --check mavik-autonomous.js
          node --check jarvis-voice.js
          node --check mavik-stability.js
          node --check service-worker.js
          node --check install.js
          node --check alpha/workshop/station.js
          node --check scripts/validate-instance.mjs

      - name: Validate MAVIK instance metadata
        run: |
          node scripts/validate-instance.mjs
          grep -q '"coreVersion": "0.42.0-core.3"' mavik.instance.lock.json
          grep -q '"mavikCoreVersion": "0.42.0-core.3"' client.config.json
          grep -q '"version": "0.43.0"' version.json
          grep -q '"role": "workshop"' client.config.json
          grep -q '"autoLogin": true' client.config.json
          ! grep -Eq '"pin"[[:space:]]*:[[:space:]]*"[0-9]{4}"' client.config.json

      - name: Assemble static site
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -a ./ dist/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude 'docs'
          touch dist/.nojekyll
          printf '{"version":"%s","coreVersion":"%s","commit":"%s","builtAt":"%s"}\n' \
            "$MAVIK_VERSION" "$MAVIK_CORE_VERSION" "$GITHUB_SHA" "$(date -u +%FT%TZ)" > dist/deployment.json
          test -f dist/mavik-autonomous.js
          test -f dist/jarvis-voice.js
          test -f dist/mavik-autonomous.css
          test -f dist/alpha/workshop/index.html
          test -f dist/alpha/workshop/station.js
          test -f dist/alpha/workshop/station.css
          test -f dist/planning.html
          test -f dist/gestion.html
          test -f dist/profil.html
          test -f dist/devis.html
          test -f dist/client.config.json
          test -f dist/mavik.instance.lock.json
          test -f dist/windows/atelier/lancer-mavik-atelier.cmd
          grep -q 'data-mavik-workstation="atelier"' dist/alpha/workshop/index.html
          grep -q 'Logitech' dist/alpha/workshop/station.js
          grep -q 'now-line' dist/alpha/workshop/station.css
          grep -q 'data-page="planning"' dist/planning.html
          grep -q 'data-page="gestion"' dist/gestion.html
          grep -q 'data-page="profile"' dist/profil.html
          grep -q 'data-page="devis"' dist/devis.html
          grep -q '0.43.0' dist/version.json
          grep -q '0.42.0-core.3' dist/mavik.instance.lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publish branch fallback
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false

  deploy-actions:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
