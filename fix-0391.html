<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#031019"><title>MAVIK — Déblocage 0.39.1</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;background:radial-gradient(circle at 50% 0,#0b4051,#031019 58%);color:#f5fbff;font-family:Inter,system-ui,sans-serif}.box{width:min(680px,100%);border:1px solid #286079;border-radius:22px;background:#071a27;padding:22px;box-shadow:0 25px 80px #0009}.logo{display:block;width:190px;max-width:70%;margin:auto;background:#fff;border-radius:14px;padding:4px}h1{text-align:center;margin-bottom:5px}.lead{text-align:center;color:#a9c2cd}.state{margin-top:16px;border:1px solid #24566b;border-radius:12px;background:#020b11;padding:13px;white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:.78rem;min-height:125px}.progress{height:12px;border-radius:999px;background:#102f3e;overflow:hidden;margin-top:14px}.progress span{display:block;width:5%;height:100%;background:linear-gradient(90deg,#19d8ef,#46e36d);transition:width .25s}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}button,a{border:1px solid #2c6177;border-radius:11px;background:#0b2a3b;color:white;padding:12px;text-align:center;text-decoration:none;cursor:pointer;font:inherit}.primary{background:#28603d;border-color:#4e9965;font-weight:900}@media(max-width:600px){.actions{grid-template-columns:1fr}}</style></head><body><main class="box"><img class="logo" src="assets/brand/gentlecare-logo.png" alt="GentleCarE"><h1>Déblocage MAVIK 0.39.1</h1><p class="lead">Correction de la boucle « Interface de secours opérationnelle ».</p><div class="progress"><span id="bar"></span></div><div class="state" id="log">Initialisation du déblocage…</div><div class="actions"><button class="primary" id="retry">Relancer le déblocage</button><a href="index.html?manual=3910">Ouvrir MAVIK</a></div></main><script>const log=document.getElementById('log'),bar=document.getElementById('bar'),write=t=>{log.textContent+='\n'+t;log.scrollTop=log.scrollHeight};let running=false;async function fix(){if(running)return;running=true;document.getElementById('retry').disabled=true;try{document.getElementById('mavik-rescue')?.remove();bar.style.width='20%';if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));write('✓ Ancien service worker supprimé');}bar.style.width='45%';if('caches'in window){const names=await caches.keys();await Promise.all(names.map(n=>caches.delete(n)));write('✓ Caches supprimés : '+(names.join(', ')||'aucun'));}bar.style.width='65%';sessionStorage.removeItem('jarvis-booted');if('serviceWorker'in navigator){const reg=await navigator.serviceWorker.register('./service-worker.js?v=3910&fresh='+Date.now(),{updateViaCache:'none'});await reg.update();if(reg.waiting)reg.waiting.postMessage({type:'SKIP_WAITING'});write('✓ Service worker v3910 installé');}bar.style.width='85%';const response=await fetch('mavik-stability.js?v=3910&fresh='+Date.now(),{cache:'no-store'});write('✓ Garde-fou non bloquant : HTTP '+response.status);bar.style.width='100%';write('✓ Déblocage terminé. Ouverture de l’écran de connexion…');setTimeout(()=>location.replace('index.html?fixed=3910-'+Date.now()),1000);}catch(error){write('✗ Échec : '+error.message);bar.style.width='10%';running=false;document.getElementById('retry').disabled=false;}}document.getElementById('retry').onclick=fix;setTimeout(fix,350);</script></body></html>
