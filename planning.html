<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GCOS — Planning atelier</title><style>:root{--p:#171a21;--p2:#20242d;--t:#f7f7f8;--m:#a9afbd;--y:#ffd400;--g:#22c55e;--b:#13a8ff;--bd:#303641}*{box-sizing:border-box}body{margin:0;background:#0d0f13;color:var(--t);font-family:system-ui}.app{max-width:1400px;margin:auto;padding:16px}.top,.row{display:flex;justify-content:space-between;gap:10px;align-items:center}.btn{border:1px solid var(--bd);background:var(--p2);color:var(--t);border-radius:11px;padding:10px 13px;text-decoration:none}.primary{background:var(--y);color:#111;font-weight:900}.card{background:var(--p);border:1px solid var(--bd);border-radius:17px;padding:15px;margin:12px 0}.muted{color:var(--m)}.actions{display:flex;gap:8px;flex-wrap:wrap}.timeline-wrap{overflow-x:auto;padding-bottom:12px}.timeline{min-width:1050px}.hours{display:grid;grid-template-columns:160px repeat(10,1fr);gap:1px;margin-bottom:4px}.hours div{padding:8px;text-align:center;color:var(--m);font-size:.85rem}.lane{display:grid;grid-template-columns:160px repeat(10,1fr);gap:1px;min-height:112px;margin-bottom:8px}.person{background:#11151c;border:1px solid var(--bd);border-radius:12px 0 0 12px;padding:14px;font-weight:900;position:sticky;left:0;z-index:3}.slot{background:#151922;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);min-width:86px}.job{margin:8px 4px;background:linear-gradient(135deg,#164563,#20242d);border:1px solid #2a7aa8;border-radius:12px;padding:10px;min-height:94px;cursor:pointer}.job strong{display:block}.badge{display:inline-block;margin-top:6px;padding:4px 7px;border-radius:99px;background:#123e23;color:#8cf0a8;font-size:.75rem}.details{margin-top:14px}.item{background:var(--p2);border-radius:13px;padding:13px;margin-top:9px}.modal{position:fixed;inset:0;background:#07090dee;display:none;place-items:center;padding:15px;z-index:20}.modal.open{display:grid}.box{width:min(680px,100%);background:var(--p);border-radius:18px;padding:20px}textarea{width:100%;background:#101319;color:var(--t);border:1px solid var(--bd);border-radius:10px;padding:10px;margin-top:8px}@media(max-width:650px){.top{align-items:flex-start;flex-direction:column}.app{padding:10px}.person{font-size:.9rem}}</style></head><body><div class="app"><header class="top"><div><h1>Planning atelier</h1><div class="muted">Vue horizontale de l’atelier. Les notes et validations ne déplacent jamais les interventions.</div></div><div class="actions"><a class="btn" href="employe.html">Mode atelier</a><a class="btn" href="index.html">Accueil</a></div></header><section class="card timeline-wrap"><div class="timeline"><div class="hours"><div>Équipe</div><div>8 h</div><div>9 h</div><div>10 h</div><div>11 h</div><div>12 h</div><div>13 h</div><div>14 h</div><div>15 h</div><div>16 h</div><div>17 h</div></div><div id="lanes"></div></div></section><section class="card details"><h2>Interventions et préparation</h2><div id="details"></div></section></div><div class="modal" id="editModal"><div class="box"><h2 id="editTitle"></h2><textarea id="newElement" rows="4" placeholder="Ajouter une consigne, une préparation ou une note…"></textarea><div class="actions" style="margin-top:10px"><button class="btn primary" onclick="addElement()">Ajouter</button><button class="btn" onclick="editModal.classList.remove('open')">Fermer</button></div></div></div><script>const team=['David','Séverine','Apprenti'];let state=JSON.parse(localStorage.getItem('gcos-state')||'null')||{interventions:[]};if(!state.interventions?.length)state.interventions=[{id:'i1',client:'Béné',vehicle:'Mini blanche 2005',status:'Préparation',date:new Date().toISOString(),detail:'Cryonettoyage dessous, moteur, passages de roues et protection anticorrosion.',assigned:'David',startHour:8,duration:4}];state.interventions=state.interventions.map((i,n)=>({...i,assigned:team.includes(i.assigned)?i.assigned:team[n%team.length],startHour:Number(i.startHour||8+(n%3)*2),duration:Number(i.duration||3)}));localStorage.setItem('gcos-state',JSON.stringify(state));let selected=null;function extras(id){let all=JSON.parse(localStorage.getItem('gcos-planning-elements')||'{}');return all[id]||[]}function saveExtras(id,list){let all=JSON.parse(localStorage.getItem('gcos-planning-elements')||'{}');all[id]=list;localStorage.setItem('gcos-planning-elements',JSON.stringify(all))}function render(){lanes.innerHTML=team.map(name=>{let jobs=state.interventions.filter(i=>i.assigned===name);let cells=Array.from({length:10},(_,idx)=>{let hour=8+idx,job=jobs.find(i=>Math.floor(i.startHour)===hour);return job?'<div class="job" style="grid-column:span '+Math.min(job.duration,10-idx)+'" onclick="focusJob(\''+job.id+'\')"><strong>'+job.vehicle+'</strong><span class="muted">'+job.client+'</span><span class="badge">'+job.status+'</span></div>':'<div class="slot"></div>'}).join('');return'<div class="lane"><div class="person">'+name+'</div>'+cells+'</div>'}).join('');details.innerHTML=[...state.interventions].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(i=>{let list=extras(i.id);return'<div class="item" id="job-'+i.id+'"><div class="row"><div><strong>'+i.vehicle+'</strong><div class="muted">'+i.assigned+' • '+new Date(i.date).toLocaleDateString('fr-FR')+' • '+i.startHour+' h</div></div><span class="badge">'+i.status+'</span></div><p>'+(i.detail||'Intervention atelier')+'</p><div class="actions"><button class="btn primary" onclick="openEdit(\''+i.id+'\')">+ Ajouter un élément</button><button class="btn" onclick="prepare(\''+i.id+'\')">Préparer maintenant</button></div>'+list.map((e,n)=>'<div class="item row"><div><strong>'+(e.done?'✓ ':'')+e.text+'</strong><div class="muted">Ajouté le '+new Date(e.at).toLocaleString('fr-FR')+'</div></div><button class="btn" onclick="toggle(\''+i.id+'\','+n+')">'+(e.done?'Rouvrir':'Valider')+'</button></div>').join('')+'</div>'}).join('')}function focusJob(id){document.getElementById('job-'+id)?.scrollIntoView({behavior:'smooth',block:'center'})}function openEdit(id){selected=id;let i=state.interventions.find(x=>x.id===id);editTitle.textContent='Ajouter un élément — '+i.vehicle;newElement.value='';editModal.classList.add('open')}function addElement(){let text=newElement.value.trim();if(!text)return;let list=extras(selected);list.push({text,done:false,at:new Date().toISOString()});saveExtras(selected,list);editModal.classList.remove('open');render()}function toggle(id,n){let list=extras(id);list[n].done=!list[n].done;saveExtras(id,list);render()}function prepare(id){localStorage.setItem('gcos-current-intervention',id);location.href='employe.html'}render();</script><script src="gcos-comms.js?v=1"></script></body></html>
